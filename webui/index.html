<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atulya Tantra</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            background: #f9fafb;
            color: #1f2937;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .header {
            text-align: center;
            padding: 24px 0 16px;
            font-size: 1.5rem;
            font-weight: 600;
            letter-spacing: -0.02em;
            color: #111827;
        }

        .main-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        .orb-container {
            position: absolute;
            top: 20%;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1;
        }

        .orb {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #dbeafe, #3b82f6);
            box-shadow: 
                0 20px 60px rgba(59, 130, 246, 0.3),
                inset 0 -20px 40px rgba(147, 197, 253, 0.4),
                inset 0 20px 40px rgba(255, 255, 255, 0.6);
            animation: float 6s ease-in-out infinite, pulse-glow 4s ease-in-out infinite;
            position: relative;
            overflow: hidden;
        }

        .orb::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(
                45deg,
                transparent 30%,
                rgba(255, 255, 255, 0.3) 50%,
                transparent 70%
            );
            animation: shimmer 3s linear infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }

        @keyframes pulse-glow {
            0%, 100% { 
                box-shadow: 
                    0 20px 60px rgba(59, 130, 246, 0.3),
                    inset 0 -20px 40px rgba(147, 197, 253, 0.4),
                    inset 0 20px 40px rgba(255, 255, 255, 0.6);
            }
            50% { 
                box-shadow: 
                    0 25px 80px rgba(59, 130, 246, 0.5),
                    inset 0 -25px 50px rgba(147, 197, 253, 0.5),
                    inset 0 25px 50px rgba(255, 255, 255, 0.7);
            }
        }

        @keyframes shimmer {
            0% { transform: translateX(-100%) translateY(-100%) rotate(45deg); }
            100% { transform: translateX(100%) translateY(100%) rotate(45deg); }
        }

        .chat-area {
            flex: 1;
            width: 100%;
            max-width: 800px;
            overflow-y: auto;
            padding: 380px 24px 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .message {
            display: flex;
            gap: 12px;
            animation: slideIn 0.3s ease-out;
        }

        .message.user {
            flex-direction: row-reverse;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message-content {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 18px;
            line-height: 1.5;
            font-size: 0.95rem;
        }

        .user .message-content {
            background: #111827;
            color: #fff;
        }

        .assistant .message-content {
            background: #fff;
            color: #1f2937;
            border: 1px solid #e5e7eb;
        }

        .input-area {
            padding: 16px 24px 24px;
            max-width: 800px;
            width: 100%;
            margin: 0 auto;
        }

        .input-wrapper {
            display: flex;
            align-items: flex-end;
            gap: 8px;
            background: #fff;
            border: 1px solid #d1d5db;
            border-radius: 24px;
            padding: 8px 12px;
            transition: all 0.2s;
        }

        .input-wrapper:focus-within {
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        .attach-btn {
            width: 36px;
            height: 36px;
            border: none;
            background: transparent;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            color: #6b7280;
            transition: all 0.2s;
        }

        .attach-btn:hover {
            background: #f3f4f6;
        }

        textarea {
            flex: 1;
            border: none;
            outline: none;
            resize: none;
            font-family: inherit;
            font-size: 0.95rem;
            line-height: 1.5;
            padding: 8px 4px;
            max-height: 150px;
            overflow-y: auto;
        }

        .action-btn {
            width: 36px;
            height: 36px;
            border: none;
            background: transparent;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            color: #6b7280;
            transition: all 0.2s;
            flex-shrink: 0;
        }

        .action-btn:hover {
            background: #f3f4f6;
        }

        .action-btn.listening {
            background: #fee2e2;
            color: #dc2626;
        }

        .send-btn {
            background: #111827;
            color: #fff;
        }

        .send-btn:hover {
            background: #1f2937;
        }

        .send-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .typing-indicator {
            display: inline-flex;
            gap: 4px;
            padding: 12px 16px;
        }

        .typing-indicator span {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #9ca3af;
            animation: bounce 1.4s infinite;
        }

        .typing-indicator span:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing-indicator span:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes bounce {
            0%, 60%, 100% {
                transform: translateY(0);
            }
            30% {
                transform: translateY(-6px);
            }
        }

        @media (max-width: 768px) {
            .orb {
                width: 150px;
                height: 150px;
            }
            .chat-area {
                padding-top: 300px;
            }
        }
    </style>
</head>
<body>
    <div class="header">Atulya Tantra</div>
    
    <div class="main-container">
        <div class="orb-container">
            <div class="orb" id="orb"></div>
        </div>
        
        <div class="chat-area" id="chatArea"></div>
    </div>

    <div class="input-area">
        <div class="input-wrapper">
            <button class="attach-btn" id="attachBtn" title="Attach file">＋</button>
            <textarea 
                id="messageInput" 
                placeholder="Message Atulya..." 
                rows="1"
            ></textarea>
            <button class="action-btn" id="micBtn" title="Voice input">🎤</button>
            <button class="action-btn" id="cameraBtn" title="Vision input">📷</button>
            <button class="send-btn action-btn" id="sendBtn" title="Send message">➤</button>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:8000';
        const chatArea = document.getElementById('chatArea');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        const micBtn = document.getElementById('micBtn');
        const cameraBtn = document.getElementById('cameraBtn');
        const attachBtn = document.getElementById('attachBtn');
        const orb = document.getElementById('orb');

        let isListening = false;
        let voiceEnabled = true; // Always enabled for audio playback

        // Auto-resize textarea
        messageInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 150) + 'px';
        });

        // Handle Enter key (Send) and Shift+Enter (New line)
        messageInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        // Send message
        async function sendMessage() {
            const message = messageInput.value.trim();
            if (!message) return;

            addMessage(message, true);
            messageInput.value = '';
            messageInput.style.height = 'auto';

            // Disable inputs
            sendBtn.disabled = true;
            messageInput.disabled = true;

            // Show typing
            const typingDiv = document.createElement('div');
            typingDiv.className = 'message assistant';
            typingDiv.innerHTML = `
                <div class="message-content">
                    <div class="typing-indicator">
                        <span></span><span></span><span></span>
                    </div>
                </div>
            `;
            chatArea.appendChild(typingDiv);
            chatArea.scrollTop = chatArea.scrollHeight;

            try {
                const response = await fetch(`${API_URL}/api/chat`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        message: message,
                        enable_voice: voiceEnabled
                    })
                });

                const data = await response.json();
                typingDiv.remove();
                addMessage(data.response, false, data);

                // Play audio if available
                if (data.audio_file) {
                    const audio = new Audio(`${API_URL}/${data.audio_file}`);
                    audio.play().catch(err => console.log('Audio error:', err));
                }
            } catch (error) {
                typingDiv.remove();
                addMessage('Error: Unable to reach server.', false);
            }

            // Re-enable inputs
            sendBtn.disabled = false;
            messageInput.disabled = false;
            messageInput.focus();
        }

        // Add message to chat
        function addMessage(text, isUser = false, metadata = {}) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${isUser ? 'user' : 'assistant'}`;
            
            const content = document.createElement('div');
            content.className = 'message-content';
            content.textContent = text;
            
            messageDiv.appendChild(content);
            chatArea.appendChild(messageDiv);
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        // Voice input (Dictation)
        micBtn.addEventListener('click', function() {
            if (!('webkitSpeechRecognition' in window)) {
                alert('Speech recognition not supported. Use Chrome browser.');
                return;
            }

            if (isListening) return;

            const recognition = new webkitSpeechRecognition();
            recognition.continuous = false;
            recognition.interimResults = false;
            recognition.lang = 'en-US';

            recognition.onstart = () => {
                isListening = true;
                micBtn.classList.add('listening');
                orb.style.transform = 'scale(1.1)';
            };

            recognition.onresult = (event) => {
                const transcript = event.results[0][0].transcript;
                messageInput.value = transcript;
                messageInput.dispatchEvent(new Event('input')); // Trigger resize
                sendMessage(); // Auto-send after dictation
            };

            recognition.onend = () => {
                isListening = false;
                micBtn.classList.remove('listening');
                orb.style.transform = 'scale(1)';
            };

            recognition.onerror = () => {
                isListening = false;
                micBtn.classList.remove('listening');
                orb.style.transform = 'scale(1)';
            };

            recognition.start();
        });

        // Camera/Vision input (placeholder)
        cameraBtn.addEventListener('click', function() {
            alert('Vision input coming soon! This will allow image/camera analysis.');
        });

        // Attach file (placeholder)
        attachBtn.addEventListener('click', function() {
            alert('File attachment coming soon! This will support images, audio, and documents.');
        });

        // Send button click
        sendBtn.addEventListener('click', sendMessage);

        // Initial focus
        messageInput.focus();
    </script>
</body>
</html>
