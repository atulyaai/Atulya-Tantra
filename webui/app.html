<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atulya Tantra - JARVIS</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%);
            color: #00ff88;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            width: 100%;
            background: rgba(0, 0, 0, 0.8);
            border: 2px solid #00ff88;
            border-radius: 20px;
            box-shadow: 0 0 40px rgba(0, 255, 136, 0.3);
            overflow: hidden;
        }

        .header {
            background: rgba(0, 255, 136, 0.1);
            padding: 20px;
            text-align: center;
            border-bottom: 2px solid #00ff88;
        }

        .header h1 {
            font-size: 2.5em;
            text-shadow: 0 0 20px #00ff88;
            margin-bottom: 5px;
        }

        .status {
            font-size: 0.9em;
            color: #888;
        }

        .status.online {
            color: #00ff88;
        }

        .chat-area {
            height: 500px;
            overflow-y: auto;
            padding: 20px;
            background: rgba(0, 0, 0, 0.5);
        }

        .message {
            margin-bottom: 15px;
            padding: 12px 18px;
            border-radius: 12px;
            animation: slideIn 0.3s ease-out;
            max-width: 80%;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .user {
            background: rgba(0, 100, 255, 0.3);
            border-left: 3px solid #0064ff;
            margin-left: auto;
            text-align: right;
        }

        .assistant {
            background: rgba(0, 255, 136, 0.2);
            border-left: 3px solid #00ff88;
        }

        .emotion-tag {
            font-size: 0.8em;
            color: #888;
            margin-top: 5px;
        }

        .controls {
            padding: 20px;
            background: rgba(0, 0, 0, 0.7);
            border-top: 1px solid #00ff88;
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }

        input[type="text"] {
            flex: 1;
            padding: 15px;
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid #00ff88;
            border-radius: 10px;
            color: #00ff88;
            font-size: 1em;
        }

        input[type="text"]:focus {
            outline: none;
            box-shadow: 0 0 15px rgba(0, 255, 136, 0.5);
        }

        button {
            padding: 15px 30px;
            background: linear-gradient(135deg, #00ff88, #00cc70);
            border: none;
            border-radius: 10px;
            color: #0a0a0a;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0, 255, 136, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .voice-controls {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .voice-btn {
            padding: 10px 20px;
            background: rgba(0, 255, 136, 0.2);
            border: 1px solid #00ff88;
            color: #00ff88;
        }

        .voice-btn.active {
            background: rgba(0, 255, 136, 0.4);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }

        .loading {
            text-align: center;
            padding: 10px;
            color: #888;
        }

        .typing-indicator {
            display: none;
            padding: 12px 18px;
            background: rgba(0, 255, 136, 0.2);
            border-left: 3px solid #00ff88;
            border-radius: 12px;
            max-width: 80px;
        }

        .typing-indicator.active {
            display: block;
        }

        .typing-indicator span {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #00ff88;
            margin: 0 2px;
            animation: bounce 1.4s infinite;
        }

        .typing-indicator span:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing-indicator span:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes bounce {
            0%, 60%, 100% {
                transform: translateY(0);
            }
            30% {
                transform: translateY(-10px);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🤖 JARVIS</h1>
            <div class="status" id="status">● Connecting...</div>
        </div>

        <div class="chat-area" id="chatArea">
            <div class="message assistant">
                <div>Hello! JARVIS Protocol is online. How may I assist you today?</div>
            </div>
        </div>

        <div class="typing-indicator" id="typingIndicator">
            <span></span><span></span><span></span>
        </div>

        <div class="controls">
            <div class="input-group">
                <input type="text" id="messageInput" placeholder="Type your message..." 
                       onkeypress="if(event.key==='Enter') sendMessage()">
                <button onclick="sendMessage()" id="sendBtn">Send</button>
            </div>
            <div class="voice-controls">
                <button class="voice-btn" id="voiceBtn" onclick="toggleVoice()">
                    🎤 Voice: OFF
                </button>
                <span style="font-size: 0.9em; color: #888;" id="voiceStatus">
                    Voice responses disabled
                </span>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:8000';
        let voiceEnabled = false;

        // Check server status
        async function checkStatus() {
            try {
                const response = await fetch(`${API_URL}/health`);
                const data = await response.json();
                document.getElementById('status').textContent = '● Online';
                document.getElementById('status').classList.add('online');
            } catch (error) {
                document.getElementById('status').textContent = '● Offline';
            }
        }

        // Toggle voice
        function toggleVoice() {
            voiceEnabled = !voiceEnabled;
            const btn = document.getElementById('voiceBtn');
            const status = document.getElementById('voiceStatus');
            
            if (voiceEnabled) {
                btn.textContent = '🎤 Voice: ON';
                btn.classList.add('active');
                status.textContent = 'Voice responses enabled';
                status.style.color = '#00ff88';
            } else {
                btn.textContent = '🎤 Voice: OFF';
                btn.classList.remove('active');
                status.textContent = 'Voice responses disabled';
                status.style.color = '#888';
            }
        }

        // Add message to chat
        function addMessage(text, isUser, metadata = {}) {
            const chatArea = document.getElementById('chatArea');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${isUser ? 'user' : 'assistant'}`;
            
            let content = `<div>${text}</div>`;
            
            if (!isUser && metadata.emotion_detected) {
                content += `<div class="emotion-tag">Emotion: ${metadata.emotion_detected} | ${metadata.personality_state}</div>`;
            }
            
            messageDiv.innerHTML = content;
            chatArea.appendChild(messageDiv);
            chatArea.scrollTop = chatArea.scrollHeight;

            // Play audio if available
            if (!isUser && metadata.audio_file) {
                playAudio(metadata.audio_file);
            }
        }

        // Play audio
        function playAudio(audioFile) {
            const audio = new Audio(`${API_URL}/${audioFile}`);
            audio.play().catch(err => console.log('Audio play failed:', err));
        }

        // Send message
        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const message = input.value.trim();
            
            if (!message) return;

            // Add user message
            addMessage(message, true);
            input.value = '';

            // Disable input
            const sendBtn = document.getElementById('sendBtn');
            sendBtn.disabled = true;
            input.disabled = true;

            // Show typing indicator
            document.getElementById('typingIndicator').classList.add('active');

            try {
                const response = await fetch(`${API_URL}/api/chat`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        message: message,
                        enable_voice: voiceEnabled
                    })
                });

                const data = await response.json();
                
                // Hide typing indicator
                document.getElementById('typingIndicator').classList.remove('active');
                
                // Add AI response
                addMessage(data.response, false, data);

            } catch (error) {
                document.getElementById('typingIndicator').classList.remove('active');
                addMessage('Error: Could not reach server. Is it running?', false);
            }

            // Re-enable input
            sendBtn.disabled = false;
            input.disabled = false;
            input.focus();
        }

        // Initialize
        checkStatus();
        setInterval(checkStatus, 30000); // Check every 30s

        // Focus input on load
        window.onload = () => {
            document.getElementById('messageInput').focus();
        };
    </script>
</body>
</html>
