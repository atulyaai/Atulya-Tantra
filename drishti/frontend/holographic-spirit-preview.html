<!DOCTYPE html>
<html lang="en">

if ('serviceWorker' in navigator) {

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="mobile-web-app-capable" content="yes">
<title>ATULYA · Holographic Spirit UI (Preview)</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:100%;height:100%;background:#000;overflow:hidden;font-family:'Courier New',monospace;color:#cc88ff}
  #ar{width:100%;height:100vh;background:#000008;position:relative;overflow:hidden;cursor:none}
  canvas{position:absolute;top:0;left:0;width:100%;height:100%;display:block}
  #main{z-index:2}
  #fx{z-index:4;pointer-events:none}
  #handv{position:absolute;top:14px;right:14px;width:200px;height:150px;z-index:9;border:1px solid rgba(136,85,255,0.27);background:#000}
  #cam{position:absolute;top:14px;right:14px;width:1px;height:1px;opacity:0;pointer-events:none}
  .hud{position:absolute;top:0;left:0;width:100%;pointer-events:none;z-index:10;color:#cc88ff;text-transform:uppercase}
  .name{text-align:center;font-size:18px;font-weight:bold;letter-spacing:8px;margin-top:14px;text-shadow:0 0 12px #cc88ff88}
  .sub{text-align:center;font-size:8px;color:#8855ff;letter-spacing:4px;margin-top:4px}
  .state{position:absolute;top:14px;left:16px;font-size:9px;color:#6633aa;letter-spacing:3px}
  .gesture{position:absolute;top:30px;left:16px;font-size:9px;color:#aa66ff;letter-spacing:3px}
  .fingers{position:absolute;top:46px;left:16px;font-size:8px;color:#6633aa;letter-spacing:2px}
  .pill{position:absolute;top:14px;right:230px;background:rgba(26,10,46,0.67);border:1px solid rgba(136,85,255,0.27);padding:5px 10px;font-size:9px;letter-spacing:2px;color:#cc88ff}
  .cam-btn{position:absolute;bottom:90px;right:16px;z-index:12;background:transparent;border:1px solid rgba(204,136,255,0.5);color:#cc88ff;font-family:'Courier New',monospace;font-size:9px;letter-spacing:2px;padding:6px 12px;cursor:pointer;transition:all 0.2s}
  .cam-btn:hover{background:rgba(204,136,255,0.13)}
  .cam-btn.on{background:rgba(68,255,136,0.13);border-color:#44ff88;color:#44ff88}
  .cam-err{position:absolute;bottom:70px;right:16px;z-index:12;background:rgba(60,0,0,0.8);border:1px solid #ff4444;color:#ff8888;padding:6px 10px;font-size:9px;max-width:280px}
  .cb{position:absolute;width:24px;height:24px;border-color:rgba(204,136,255,0.2);border-style:solid;pointer-events:none;z-index:5}
  .tl{top:8px;left:8px;border-width:2px 0 0 2px}.tr{top:8px;right:8px;border-width:2px 2px 0 0}
  .bl{bottom:110px;left:8px;border-width:0 0 2px 2px}.br{bottom:110px;right:8px;border-width:0 2px 2px 0}
  .storyboard{position:absolute;bottom:14px;left:50%;transform:translateX(-50%);display:flex;gap:6px;z-index:12;background:rgba(0,0,0,0.5);padding:8px;border:1px solid rgba(136,85,255,0.2)}
  .frame{position:relative;width:80px;height:60px;background:#000010;border:1px solid rgba(136,85,255,0.13);cursor:pointer;transition:all 0.2s;display:flex;align-items:center;justify-content:center;overflow:hidden}
  .frame:hover{border-color:rgba(204,136,255,0.5)}
  .frame.active{border-color:#cc88ff;box-shadow:0 0 12px rgba(204,136,255,0.4);transform:scale(1.08)}
  .num{position:absolute;top:2px;left:4px;font-size:8px;color:#cc88ff;z-index:2;text-shadow:0 0 4px #000}
  .lbl{position:absolute;bottom:1px;left:0;right:0;font-size:7px;color:#cc88ff;text-align:center;letter-spacing:1px;z-index:2;text-shadow:0 0 4px #000}
  .legend{position:absolute;bottom:90px;left:50%;transform:translateX(-50%);display:flex;gap:14px;z-index:12;font-size:9px;color:#aa66ff;letter-spacing:1px;pointer-events:none}
  .legend span{display:flex;align-items:center;gap:5px;background:rgba(0,0,0,0.4);padding:4px 8px;border:1px solid rgba(136,85,255,0.13)}
  .toast{position:absolute;top:80px;left:50%;transform:translateX(-50%);background:rgba(26,10,46,0.8);border:1px solid #cc88ff;color:#e0aaff;padding:8px 16px;font-size:11px;letter-spacing:3px;z-index:13;opacity:0;transition:opacity 0.3s;pointer-events:none}
  .toast.show{opacity:1}
</style>
</head>
<body>
<div id="ar">
  <canvas id="main"></canvas>
  <canvas id="fx"></canvas>
  <video id="cam" autoplay playsinline muted></video>
  <canvas id="handv"></canvas>
  <div class="cb tl"></div><div class="cb tr"></div>
  <div class="cb bl"></div><div class="cb br"></div>
  <div class="hud">
    <div class="name" id="name">⬡ ATULYA ⬡</div>
    <div class="sub">HOLOGRAPHIC SPIRIT ENTITY · v2.0</div>
    <div class="state" id="state">PHASE: SPIRIT</div>
    <div class="gesture" id="gesture">GESTURE: NONE</div>
    <div class="fingers" id="fingers">FINGERS: 0 · INPUT: IDLE</div>
    <div class="pill" id="pill">ACTIVE</div>
  </div>
  <button class="cam-btn" id="cam-btn">◯ ENABLE HAND TRACKING</button>
  <div id="cam-err"></div>
  <div class="storyboard" id="storyboard"></div>
  <div class="legend">
    <span>👆 POINT · MOVE</span>
    <span>🤏 PINCH · SELECT</span>
    <span>✋ PALM · NEXT PHASE</span>
    <span>✊ FIST · COMPRESS</span>
  </div>
  <div class="toast" id="toast"></div>
</div>

<script>
(function(){
'use strict';

const PHASES = [
  { name: 'SPIRIT', palette: ['#cc88ff','#88aaff','#ff88cc','#aaffee','#ffcc88'] },
  { name: 'WINGS',  palette: ['#ffaa44','#ff6688','#aa44ff','#ff88aa','#ffdd66'] },
  { name: 'LOTUS',  palette: ['#ff55aa','#aa44ff','#ff8844','#ff44cc','#ffaa55'] },
  { name: 'STORM',  palette: ['#44ccff','#88ffee','#4488ff','#22eecc','#88aaff'] },
  { name: 'GALAXY', palette: ['#ff88cc','#88aaff','#aaffcc','#ccaaff','#ffaadd'] },
  { name: 'VORTEX', palette: ['#ff4466','#ffaa22','#44ffaa','#4488ff','#ff44aa'] }
];
const NODES = [
  { id:'PF', label:'PREFRONTAL',    x:0.78, y:0.18, color:'#ff6644', info:'Executive · planning' },
  { id:'MC', label:'MOTOR CORTEX',  x:0.62, y:0.28, color:'#ffaa00', info:'Movement control' },
  { id:'SC', label:'SENSORY CORTEX',x:0.66, y:0.46, color:'#ff4477', info:'Input processing' },
  { id:'CO', label:'CONCEPT LAYER', x:0.86, y:0.36, color:'#ffdd00', info:'Abstract thought' },
  { id:'FO', label:'FOUNDATION',    x:0.76, y:0.42, color:'#00ccff', info:'Core knowledge base' },
  { id:'FL', label:'FEATURE LAYER', x:0.68, y:0.66, color:'#ff8833', info:'Pattern detection' },
  { id:'LG', label:'LANGUAGE',      x:0.54, y:0.58, color:'#cc44ff', info:'NLP & generation' },
  { id:'HC', label:'HIPPOCAMPUS',   x:0.80, y:0.76, color:'#00ff88', info:'Memory formation' },
  { id:'BS', label:'BRAINSTEM',     x:0.66, y:0.84, color:'#44ff44', info:'Vital functions' }
];
const EDGES = [['PF','MC'],['PF','CO'],['PF','FO'],['MC','SC'],['MC','FO'],['SC','FO'],['SC','LG'],['CO','FO'],['CO','FL'],['FO','FL'],['FO','LG'],['FO','HC'],['FL','LG'],['FL','BS'],['LG','HC'],['HC','BS'],['BS','SC']];

function dist(a, b) { return Math.hypot(a.x-b.x, a.y-b.y, (a.z||0)-(b.z||0)); }
function recognizeGesture(lm) {
  if (!lm || lm.length < 21) return { gesture:'NONE', fingers:0, pinch:0, fist:0 };
  const tips=[8,12,16,20], pips=[6,10,14,18];
  let fingers = 0;
  for (let i=0; i<4; i++) {
    if (dist(lm[tips[i]], lm[0]) > dist(lm[pips[i]], lm[0]) * 1.08) fingers++;
  }
  const thumbExt = dist(lm[4], lm[5]) > dist(lm[3], lm[5]) * 1.1;
  const total = fingers + (thumbExt ? 1 : 0);
  const pinch = Math.max(0, 1 - dist(lm[4], lm[8]) / 0.08);
  const fist = Math.max(0, 1 - total / 5);
  let g = 'POINT';
  if (pinch > 0.6) g = 'PINCH';
  else if (total >= 4) g = 'PALM';
  else if (fist > 0.7) g = 'FIST';
  else if (fingers >= 2) g = 'WAVE';
  return { gesture: g, fingers: total, pinch, fist };
}

const root = document.getElementById('ar');
const mainC = document.getElementById('main');
const fxC = document.getElementById('fx');
const handC = document.getElementById('handv');
const cam = document.getElementById('cam');
const camBtn = document.getElementById('cam-btn');
const camErr = document.getElementById('cam-err');
const toast = document.getElementById('toast');
const stateTag = document.getElementById('state');
const gestureTag = document.getElementById('gesture');
const fingersTag = document.getElementById('fingers');
const pillTag = document.getElementById('pill');
const nameTag = document.getElementById('name');

let W = 0, H = 0, CX = 0, CY = 0, X = null, FX = null;
function resize() {
  W = root.clientWidth; H = root.clientHeight;
  mainC.width = W; mainC.height = H;
  fxC.width = W; fxC.height = H;
  CX = W/2; CY = H/2 - 30;
  X = mainC.getContext('2d');
  FX = fxC.getContext('2d');
}
window.addEventListener('resize', resize);
resize();

const state = {
  t: 0, phase: 0, phaseMorph: 0,
  cursor: { x: 0, y: 0 },
  mouse: { x: 0, y: 0, active: false },
  usingHand: false, gesture: 'NONE', fingers: 0, pinch: 0, fist: 0,
  graphReveal: 0, graphTarget: 0,
  hoveredNode: null, selectedNode: null,
  palmDebounce: false, fistDebounce: false
};
state.cursor.x = CX; state.cursor.y = CY;
state.mouse.x = CX; state.mouse.y = CY;

// build storyboard UI
const sbEl = document.getElementById('storyboard');
PHASES.forEach((p, i) => {
  const f = document.createElement('div');
  f.className = 'frame' + (i === 0 ? ' active' : '');
  f.innerHTML = `<div class="num">${i+1}</div><div class="lbl">${p.name}</div>`;
  f.onclick = () => {
    if (state.phase === i) state.phase = (state.phase + 1) % PHASES.length;
    else state.phase = i;
    state.phaseMorph = 0;
    triggerBurst(CX, CY);
    updateStoryboard();
  };
  sbEl.appendChild(f);
});
function updateStoryboard() {
  sbEl.querySelectorAll('.frame').forEach((f, i) => f.classList.toggle('active', i === state.phase));
}

// input
root.addEventListener('mousemove', e => {
  const r = root.getBoundingClientRect();
  state.mouse.x = e.clientX - r.left;
  state.mouse.y = e.clientY - r.top;
  state.mouse.active = true;
});
root.addEventListener('mouseleave', () => { state.mouse.active = false; });
root.addEventListener('mousedown', e => {
  const r = root.getBoundingClientRect();
  triggerBurst(e.clientX - r.left, e.clientY - r.top);
  if (state.hoveredNode) { state.selectedNode = state.hoveredNode; triggerBurst(state.hoveredNode.x*W, state.hoveredNode.y*H); showToast('◆ ' + state.hoveredNode.label); }
});
root.addEventListener('touchmove', e => {
  if (e.touches.length) {
    const r = root.getBoundingClientRect();
    state.mouse.x = e.touches[0].clientX - r.left;
    state.mouse.y = e.touches[0].clientY - r.top;
    state.mouse.active = true;
  }
  e.preventDefault();
}, { passive: false });

// stars
const stars = Array.from({length: 200}, () => ({ x: Math.random(), y: Math.random(), r: Math.random()*1.3+0.2, tw: Math.random()*Math.PI*2, layer: Math.random() }));
// crystals
const crystals = Array.from({length: 22}, () => ({ angle: Math.random()*Math.PI*2, r: 130+Math.random()*180, drift: (Math.random()-0.5)*0.008, size: 8+Math.random()*18, phase: Math.random()*Math.PI*2, color: Math.floor(Math.random()*5) }));
// ribbons
const ribbons = Array.from({length: 7}, (_,i) => ({ pts: Array.from({length: 90}, () => ({x:0,y:0})), phase: i*Math.PI*2/7, width: 1.5+i*0.4, colorIdx: i%5, speedMul: 0.8+Math.random()*0.4 }));
ribbons.forEach(rb => rb.pts.forEach(p => { p.x = CX; p.y = CY; }));
// sphere
const NSPHERE = 700;
const spherePts = [];
for (let i=0; i<NSPHERE; i++) {
  const phi = Math.acos(1 - 2*(i+0.5)/NSPHERE);
  const theta = Math.PI*(1+Math.sqrt(5))*(i+0.5);
  spherePts.push({ phi, theta, size: 0.5+Math.random()*1.4 });
}
let sphRotY = 0, sphRotX = 0;
// wisps
const wisps = Array.from({length: 36}, (_,i) => ({ angle: i*Math.PI*2/36, r: 60+Math.random()*40, phase: Math.random()*Math.PI*2, color: Math.floor(Math.random()*5), size: 2+Math.random()*3 }));
// lotus
const lotusPetals = Array.from({length: 14}, (_,i) => ({ angle: i*Math.PI*2/14, phase: Math.random()*Math.PI*2 }));
// pulses
const pulses = [];
EDGES.forEach(([a,b]) => pulses.push({ a, b, t: Math.random() }));
// bursts
const bursts = [];
function triggerBurst(x, y) {
  for (let i=0; i<20; i++) {
    const ang = Math.random()*Math.PI*2;
    const spd = 1+Math.random()*4;
    bursts.push({ x, y, vx: Math.cos(ang)*spd, vy: Math.sin(ang)*spd, life: 0, max: 0.6+Math.random()*0.6, color: Math.floor(Math.random()*5), size: 1+Math.random()*3 });
  }
}
function showToast(msg) {
  toast.textContent = msg;
  toast.classList.add('show');
  clearTimeout(window._toastT);
  window._toastT = setTimeout(() => toast.classList.remove('show'), 2400);
}

function drawBg() {
  X.fillStyle = '#000008';
  X.fillRect(0, 0, W, H);
  const pal = PHASES[state.phase].palette;
  stars.forEach(s => {
    s.tw += 0.02;
    const a = 0.2 + 0.4*Math.sin(s.tw);
    const r = s.r * (1 + s.layer*0.5);
    X.beginPath();
    X.arc(s.x*W, s.y*H, r, 0, Math.PI*2);
    X.fillStyle = `rgba(180,160,255,${a})`;
    X.fill();
  });
  const g = X.createRadialGradient(CX, CY, 0, CX, CY, 260);
  g.addColorStop(0, pal[0]+'22');
  g.addColorStop(0.5, '#10001a55');
  g.addColorStop(1, 'transparent');
  X.fillStyle = g;
  X.beginPath(); X.arc(CX, CY, 260, 0, Math.PI*2); X.fill();
}

function drawCrystals(t) {
  const pal = PHASES[state.phase].palette;
  crystals.forEach(c => {
    c.angle += c.drift + (state.cursor.x - CX)*0.00004;
    const cx2 = CX + Math.cos(c.angle)*c.r;
    const cy2 = CY + Math.sin(c.angle)*c.r*0.6;
    const pls = 0.7 + 0.3*Math.sin(t*1.5 + c.phase);
    const col = pal[c.color];
    X.save();
    X.translate(cx2, cy2);
    X.rotate(c.angle + t*0.4);
    X.beginPath();
    X.moveTo(0, -c.size*pls);
    X.lineTo(c.size*0.4, 0);
    X.lineTo(0, c.size*pls);
    X.lineTo(-c.size*0.4, 0);
    X.closePath();
    X.strokeStyle = col+'cc';
    X.lineWidth = 1.2;
    X.stroke();
    X.fillStyle = col+'33';
    X.fill();
    X.restore();
    const gl = X.createRadialGradient(cx2, cy2, 0, cx2, cy2, c.size*2.4);
    gl.addColorStop(0, col+'44');
    gl.addColorStop(1, 'transparent');
    X.fillStyle = gl;
    X.beginPath(); X.arc(cx2, cy2, c.size*2.4, 0, Math.PI*2); X.fill();
  });
}

function drawSphere(t) {
  const pal = PHASES[state.phase].palette;
  const handInfluence = state.usingHand ? (state.cursor.x - CX)/W : 0;
  sphRotY += 0.008 + handInfluence*0.02;
  const dx = (state.cursor.x - CX)/W * 0.5;
  sphRotX += (dx*0.03 - sphRotX)*0.05;
  const compress = 1 - state.fist*0.35;
  const baseR = 110 * compress * (1 - state.phaseMorph*0.3);

  const projected = spherePts.map((p, i) => {
    const wobble = 0.85 + 0.15*Math.sin(t*1.2 + i*0.1);
    let x = baseR * Math.sin(p.phi) * Math.cos(p.theta + sphRotY) * wobble;
    let y = baseR * Math.cos(p.phi) * wobble;
    let z = baseR * Math.sin(p.phi) * Math.sin(p.theta + sphRotY) * wobble;
    const cosX = Math.cos(sphRotX), sinX = Math.sin(sphRotX);
    const y2 = y*cosX - z*sinX;
    const z2 = y*sinX + z*cosX;
    const depth = (z2 + baseR) / (2*baseR);
    return { sx: CX+x, sy: CY+y2, depth, i };
  }).sort((a,b) => a.depth - b.depth);

  projected.forEach(p => {
    const a = 0.15 + p.depth*0.85;
    const r = p.i%7===0 ? (0.8 + p.depth*1.8) : (0.5 + p.depth*1.2);
    const colIdx = p.depth > 0.7 ? 0 : (p.depth > 0.4 ? 1 : 2);
    const col = pal[colIdx];
    const ah = Math.floor(a*255).toString(16).padStart(2,'0');
    X.beginPath();
    X.arc(p.sx, p.sy, r, 0, Math.PI*2);
    X.fillStyle = col + ah;
    X.fill();
    if (p.i % 23 === 0) {
      X.beginPath();
      X.arc(p.sx, p.sy, r*2.5, 0, Math.PI*2);
      X.fillStyle = col + '33';
      X.fill();
    }
  });

  const rx = baseR*1.4, ry = baseR*0.3;
  X.beginPath();
  X.ellipse(CX, CY, rx, ry, -0.15, 0, Math.PI*2);
  X.strokeStyle = pal[0] + '44';
  X.lineWidth = 1.5;
  X.stroke();
}

function drawRibbons(t) {
  const pal = PHASES[state.phase].palette;
  ribbons.forEach(rib => {
    const spd = 0.025 * rib.speedMul * (state.gesture === 'FIST' ? 2 : 1);
    const a = t*spd*2 + rib.phase;
    const r2 = 70 + Math.sin(t*0.7 + rib.phase)*40;
    let hx = CX + Math.cos(a)*r2 + Math.cos(a*2.3+rib.phase)*30;
    let hy = CY + Math.sin(a)*r2*0.7 + Math.sin(a*1.7)*20;
    hx += (state.cursor.x - CX)*0.12*Math.sin(rib.phase);
    hy += (state.cursor.y - CY)*0.10*Math.cos(rib.phase);
    rib.pts.unshift({x: hx, y: hy});
    rib.pts.pop();
    X.beginPath();
    X.moveTo(rib.pts[0].x, rib.pts[0].y);
    for (let i=1; i<rib.pts.length-1; i++) {
      const mx2 = (rib.pts[i].x + rib.pts[i+1].x)/2;
      const my2 = (rib.pts[i].y + rib.pts[i+1].y)/2;
      X.quadraticCurveTo(rib.pts[i].x, rib.pts[i].y, mx2, my2);
    }
    const col = pal[rib.colorIdx];
    const grd = X.createLinearGradient(rib.pts[0].x, rib.pts[0].y, rib.pts[40].x, rib.pts[40].y);
    grd.addColorStop(0, col+'ff');
    grd.addColorStop(0.3, col+'88');
    grd.addColorStop(1, col+'00');
    X.strokeStyle = grd;
    X.lineWidth = rib.width * (state.gesture === 'FIST' ? 1.8 : 1);
    X.stroke();
  });
}

function drawEntity(t) {
  const pal = PHASES[state.phase].palette;
  const br = 0.9 + 0.1*Math.sin(t*0.04);
  const ph = state.phase;

  if (ph === 0 || ph === 3) {
    for (let i=0; i<3; i++) {
      const r = (28+i*14)*br;
      const off = t*0.8 + i*Math.PI/3;
      X.beginPath();
      X.ellipse(CX+Math.cos(off)*6, CY+Math.sin(off)*4, r, r*0.4+i*3, off, 0, Math.PI*2);
      X.strokeStyle = pal[i] + (i===0?'cc':'66');
      X.lineWidth = 1.5 - i*0.3;
      X.stroke();
    }
    const haloR = 55*br;
    X.beginPath(); X.arc(CX, CY-10, haloR, 0, Math.PI*2);
    X.strokeStyle = pal[0]+'aa'; X.lineWidth = 2; X.stroke();
    const bodyG = X.createRadialGradient(CX, CY, 0, CX, CY, 60);
    bodyG.addColorStop(0, pal[0]+'55');
    bodyG.addColorStop(0.5, pal[1]+'22');
    bodyG.addColorStop(1, 'transparent');
    X.fillStyle = bodyG;
    X.beginPath(); X.ellipse(CX, CY, 40, 70, 0, 0, Math.PI*2); X.fill();
    for (let i=0; i<8; i++) {
      const a = i*Math.PI/4 + t*0.3;
      const r = 50+20*Math.sin(t+i);
      X.beginPath(); X.moveTo(CX, CY);
      X.quadraticCurveTo(CX+Math.cos(a+0.5)*r*0.6, CY+Math.sin(a+0.5)*r*0.4, CX+Math.cos(a)*r, CY+Math.sin(a)*r*0.6);
      X.strokeStyle = pal[i%5]+'55'; X.lineWidth = 0.8; X.stroke();
    }
  }

  if (ph === 2) {
    lotusPetals.forEach((p, i) => {
      p.phase += 0.012;
      const r = 60+20*Math.sin(p.phase)*br;
      const px2 = CX+Math.cos(p.angle)*r;
      const py2 = CY+Math.sin(p.angle)*r*0.5;
      const cpx = CX+Math.cos(p.angle+0.4)*r*0.7;
      const cpy = CY+Math.sin(p.angle+0.4)*r*0.35;
      X.beginPath(); X.moveTo(CX, CY);
      X.quadraticCurveTo(cpx, cpy, px2, py2);
      X.quadraticCurveTo(cpx-5, cpy+5, CX, CY);
      X.strokeStyle = pal[i%5]+'bb'; X.lineWidth = 1.5; X.stroke();
      X.fillStyle = pal[i%5]+'22'; X.fill();
    });
    const cg = X.createRadialGradient(CX, CY, 0, CX, CY, 35);
    cg.addColorStop(0, pal[0]+'99');
    cg.addColorStop(0.6, pal[1]+'44');
    cg.addColorStop(1, 'transparent');
    X.fillStyle = cg;
    X.beginPath(); X.arc(CX, CY, 35, 0, Math.PI*2); X.fill();
  }

  if (ph === 1) {
    for (let s=-1; s<=1; s+=2) {
      for (let i=0; i<5; i++) {
        const flap = Math.sin(t*1.2+i*0.3)*0.3*s;
        const wa = s*(0.2+i*0.18) + flap;
        const wr = 80+i*25;
        const wx = CX+Math.cos(wa)*wr*s;
        const wy = CY+Math.sin(Math.abs(wa))*(30+i*8) - i*10;
        const cpx = CX+Math.cos(wa+0.6*s)*wr*0.6*s;
        const cpy = CY+Math.sin(Math.abs(wa+0.3))*(20+i*5);
        X.beginPath(); X.moveTo(CX, CY);
        X.quadraticCurveTo(cpx, cpy, wx, wy);
        X.quadraticCurveTo(cpx*0.5, cpy+20, CX, CY+30);
        X.strokeStyle = pal[i%5]+'cc'; X.lineWidth = 1.8-i*0.2; X.stroke();
        X.fillStyle = pal[i%5]+(i<2?'33':'18'); X.fill();
      }
    }
  }

  if (ph === 4) {
    for (let arm=0; arm<4; arm++) {
      X.beginPath();
      for (let t2=0; t2<60; t2++) {
        const a = arm*Math.PI/2 + t2*0.04 + t*0.1;
        const r = t2*1.2;
        const px = CX+Math.cos(a)*r;
        const py = CY+Math.sin(a)*r*0.5;
        if (t2===0) X.moveTo(px, py); else X.lineTo(px, py);
      }
      X.strokeStyle = pal[arm%5]+'66';
      X.lineWidth = 1.5;
      X.stroke();
    }
  }

  if (ph === 5) {
    X.beginPath();
    for (let t2=0; t2<200; t2++) {
      const a = t2*0.15 + t*0.3;
      const r = t2*0.5;
      const px = CX+Math.cos(a)*r;
      const py = CY+Math.sin(a)*r;
      if (t2===0) X.moveTo(px, py); else X.lineTo(px, py);
    }
    X.strokeStyle = pal[1]+'88';
    X.lineWidth = 2;
    X.stroke();
  }

  const core = X.createRadialGradient(CX, CY, 0, CX, CY, 22);
  core.addColorStop(0, '#ffffff');
  core.addColorStop(0.3, pal[0]+'ff');
  core.addColorStop(0.7, pal[1]+'88');
  core.addColorStop(1, 'transparent');
  X.fillStyle = core;
  X.beginPath(); X.arc(CX, CY, 22, 0, Math.PI*2); X.fill();
}

function drawWisps(t) {
  const pal = PHASES[state.phase].palette;
  wisps.forEach(w => {
    w.phase += 0.015;
    const r = w.r + Math.sin(w.phase)*20;
    const wx = CX+Math.cos(w.angle+t*0.1)*r;
    const wy = CY+Math.sin(w.angle+t*0.1)*r*0.5;
    const a = 0.5+0.5*Math.sin(w.phase);
    const ah = Math.floor(a*180).toString(16).padStart(2,'0');
    X.beginPath();
    X.arc(wx, wy, w.size*a, 0, Math.PI*2);
    X.fillStyle = pal[w.color]+ah;
    X.fill();
  });
}

function drawBursts(dt) {
  const pal = PHASES[state.phase].palette;
  for (let i=bursts.length-1; i>=0; i--) {
    const p = bursts[i];
    p.life += dt;
    p.x += p.vx; p.y += p.vy; p.vy += 0.05;
    const frac = 1 - p.life/p.max;
    if (frac <= 0) { bursts.splice(i, 1); continue; }
    const ah = Math.floor(frac*255).toString(16).padStart(2,'0');
    X.beginPath();
    X.arc(p.x, p.y, p.size*frac, 0, Math.PI*2);
    X.fillStyle = pal[p.color]+ah;
    X.fill();
  }
}

function drawGraph(t) {
  state.graphReveal += (state.graphTarget - state.graphReveal) * 0.04;
  if (state.graphReveal < 0.01) { state.hoveredNode = null; return; }
  const pal = PHASES[state.phase].palette;
  const baseX = W*0.78;
  const baseY = H*0.5;
  const scale = Math.min(W, H)*0.18;
  const yScale = state.usingHand ? 1 + (state.cursor.y/H - 0.5)*0.4 : 1;

  X.save();
  X.translate(baseX, baseY);
  X.scale(state.graphReveal * yScale, state.graphReveal * yScale);

  EDGES.forEach(([aid,bid]) => {
    const a = NODES.find(n=>n.id===aid);
    const b = NODES.find(n=>n.id===bid);
    const ax = a.x*scale - scale*0.5, ay = a.y*scale - scale*0.5;
    const bx = b.x*scale - scale*0.5, by = b.y*scale - scale*0.5;
    X.beginPath();
    X.moveTo(ax, ay); X.lineTo(bx, by);
    X.strokeStyle = pal[1]+'44';
    X.lineWidth = 0.7;
    X.stroke();
  });

  pulses.forEach(p => {
    p.t = (p.t + 0.012) % 1;
    if (Math.random() < 0.005) {
      const e = EDGES[Math.floor(Math.random()*EDGES.length)];
      pulses.push({a:e[0], b:e[1], t:0});
    }
    const a = NODES.find(n=>n.id===p.a);
    const b = NODES.find(n=>n.id===p.b);
    const ax = a.x*scale - scale*0.5, ay = a.y*scale - scale*0.5;
    const bx = b.x*scale - scale*0.5, by = b.y*scale - scale*0.5;
    const px = ax + (bx-ax)*p.t, py = ay + (by-ay)*p.t;
    const fade = 1 - Math.abs(p.t-0.5)*2;
    X.beginPath(); X.arc(px, py, 2.5, 0, Math.PI*2);
    X.fillStyle = `rgba(255,255,255,${fade*0.9})`;
    X.fill();
  });

  state.hoveredNode = null;
  NODES.forEach(n => {
    const nx = n.x*scale - scale*0.5, ny = n.y*scale - scale*0.5;
    const worldX = baseX + nx*state.graphReveal*yScale;
    const worldY = baseY + ny*state.graphReveal*yScale;
    const d = Math.hypot(state.cursor.x - worldX, state.cursor.y - worldY);
    const isHov = d < 30;
    if (isHov) state.hoveredNode = n;
    const pulse = 0.7 + 0.3*Math.sin(t*2 + n.x*10);
    const r = (state.selectedNode === n ? 12 : (isHov ? 11 : 7*pulse));
    const grd = X.createRadialGradient(nx, ny, 0, nx, ny, r*3);
    grd.addColorStop(0, n.color+'88');
    grd.addColorStop(1, 'transparent');
    X.beginPath(); X.arc(nx, ny, r*3, 0, Math.PI*2);
    X.fillStyle = grd; X.fill();
    X.beginPath(); X.arc(nx, ny, r, 0, Math.PI*2);
    X.fillStyle = isHov || state.selectedNode === n ? '#ffffff' : n.color;
    X.fill();
    X.fillStyle = isHov || state.selectedNode === n ? '#ffffff' : n.color+'dd';
    X.font = (isHov?'bold ':'')+'8px Courier New';
    X.fillText(n.label, nx+r+3, ny-2);
  });
  X.restore();

  if (state.graphReveal > 0.3) {
    X.fillStyle = pal[0]+'cc';
    X.font = '9px Courier New';
    X.fillText('◆ NEURAL KNOWLEDGE GRAPH', baseX - scale*0.5, baseY - scale*0.55);
  }
}

function drawCursorFx() {
  const pal = PHASES[state.phase].palette;
  const ringR = 8 + (state.gesture==='PALM' ? 8 + Math.sin(state.t*4)*3 : 0) + state.pinch*10;
  const g = FX.createRadialGradient(state.cursor.x, state.cursor.y, 0, state.cursor.x, state.cursor.y, ringR);
  g.addColorStop(0, pal[0]+'cc');
  g.addColorStop(0.5, pal[1]+'44');
  g.addColorStop(1, 'transparent');
  FX.fillStyle = g;
  FX.beginPath();
  FX.arc(state.cursor.x, state.cursor.y, ringR, 0, Math.PI*2);
  FX.fill();
  FX.strokeStyle = pal[0]+'88';
  FX.lineWidth = 0.8;
  FX.beginPath();
  FX.moveTo(state.cursor.x-18, state.cursor.y); FX.lineTo(state.cursor.x-6, state.cursor.y);
  FX.moveTo(state.cursor.x+6, state.cursor.y); FX.lineTo(state.cursor.x+18, state.cursor.y);
  FX.moveTo(state.cursor.x, state.cursor.y-18); FX.lineTo(state.cursor.x, state.cursor.y-6);
  FX.moveTo(state.cursor.x, state.cursor.y+6); FX.lineTo(state.cursor.x, state.cursor.y+18);
  FX.stroke();
  if (state.pinch > 0.3) {
    FX.beginPath();
    FX.arc(state.cursor.x, state.cursor.y, 22+state.pinch*8, 0, Math.PI*2);
    FX.strokeStyle = `rgba(255,255,255,${state.pinch})`;
    FX.lineWidth = 2;
    FX.stroke();
  }
  if (state.fist > 0.5) {
    FX.beginPath();
    FX.arc(state.cursor.x, state.cursor.y, 30, 0, Math.PI*2);
    FX.strokeStyle = `rgba(255,80,80,${state.fist*0.5})`;
    FX.lineWidth = 3;
    FX.stroke();
  }
}

// ─── MAIN LOOP ───
let lastT = performance.now();
function loop(now) {
  const dt = Math.min(0.05, (now - lastT) / 1000);
  lastT = now;
  state.t += dt;
  state.phaseMorph = Math.min(1, state.phaseMorph + dt*0.8);

  if (!state.usingHand && state.mouse.active) {
    state.cursor.x += (state.mouse.x - state.cursor.x) * 0.18;
    state.cursor.y += (state.mouse.y - state.cursor.y) * 0.18;
  }

  drawBg();
  drawWisps(state.t);
  drawCrystals(state.t);
  drawRibbons(state.t);
  drawSphere(state.t);
  drawEntity(state.t);
  drawGraph(state.t);
  drawBursts(dt);

  FX.clearRect(0, 0, W, H);
  drawCursorFx();
  const vg = FX.createRadialGradient(CX, CY, 0, CX, CY, Math.max(W, H)*0.7);
  vg.addColorStop(0, 'transparent');
  vg.addColorStop(1, '#00000099');
  FX.fillStyle = vg;
  FX.fillRect(0, 0, W, H);

  // HUD
  const pal = PHASES[state.phase].palette;
  nameTag.style.color = pal[0];
  nameTag.style.textShadow = `0 0 12px ${pal[0]}88`;
  stateTag.textContent = 'PHASE: ' + PHASES[state.phase].name;
  gestureTag.textContent = 'GESTURE: ' + state.gesture;
  fingersTag.textContent = 'FINGERS: ' + state.fingers + ' · INPUT: ' + (state.usingHand ? 'HAND' : (state.mouse.active ? 'MOUSE' : 'IDLE'));
  pillTag.textContent = state.usingHand ? 'HAND ACTIVE' : (state.mouse.active ? 'MOUSE' : 'IDLE');
  updateStoryboard();

  requestAnimationFrame(loop);
}

// ─── CAMERA + MEDIAPIPE ───
let hands = null;
let handRunning = false;
const handX = handC.getContext('2d');

async function startCamera() {
  camErr.textContent = '';
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ video: { width: 320, height: 240, facingMode: 'user' }, audio: false });
    cam.srcObject = stream;
    await cam.play();
    camBtn.classList.add('on');
    camBtn.textContent = '◉ CAMERA ON';
    showToast('◆ CAMERA ONLINE · LOADING HAND TRACKER');
    if (typeof window.Hands === 'undefined') {
      await loadScript('https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1675469240/hands.js');
    }
    if (typeof window.Hands === 'undefined') throw new Error('MediaPipe failed to load');
    hands = new window.Hands({
      locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1675469240/${file}`
    });
    hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.6, minTrackingConfidence: 0.5 });
    hands.onResults(onHandResults);
    handRunning = true;
    tickHands();
    showToast('◆ HAND TRACKING ONLINE');
  } catch (err) {
    camErr.textContent = 'Camera unavailable: ' + err.message;
    camBtn.classList.remove('on');
    camBtn.textContent = '◯ ENABLE HAND TRACKING';
  }
}

function stopCamera() {
  handRunning = false;
  const s = cam.srcObject;
  if (s) s.getTracks().forEach(t => t.stop());
  cam.srcObject = null;
  camBtn.classList.remove('on');
  camBtn.textContent = '◯ ENABLE HAND TRACKING';
  state.usingHand = false;
  state.gesture = 'NONE';
  if (hands) { try { hands.close(); } catch(e){} hands = null; }
}

async function tickHands() {
  if (!handRunning) return;
  if (cam.readyState >= 2) {
    try { await hands.send({ image: cam }); } catch (e) {}
  }
  requestAnimationFrame(tickHands);
}

function onHandResults(results) {
  drawHandViz(results);
  if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
    const lm = results.multiHandLandmarks[0];
    state.usingHand = true;
    state.cursor.x = (1 - lm[8].x) * W;
    state.cursor.y = lm[8].y * H;
    const r = recognizeGesture(lm);
    state.gesture = r.gesture;
    state.fingers = r.fingers;
    state.pinch = r.pinch;
    state.fist = r.fist;
    if (r.pinch > 0.7) {
      state.graphTarget = 1;
      if (state.hoveredNode && state.hoveredNode !== state.selectedNode) {
        state.selectedNode = state.hoveredNode;
        triggerBurst(state.hoveredNode.x*W, state.hoveredNode.y*H);
        showToast('◆ ' + state.hoveredNode.label);
      }
    }
    if (r.gesture === 'PALM' && !state.palmDebounce) {
      state.palmDebounce = true;
      state.phase = (state.phase + 1) % PHASES.length;
      state.phaseMorph = 0;
      triggerBurst(CX, CY);
      showToast('◆ PHASE · ' + PHASES[state.phase].name);
      setTimeout(() => { state.palmDebounce = false; }, 800);
    }
    if (r.gesture === 'FIST' && !state.fistDebounce) {
      state.fistDebounce = true;
      state.graphTarget = 0;
      setTimeout(() => { state.fistDebounce = false; }, 600);
    }
    if (r.gesture === 'WAVE') {
      state.graphTarget = Math.min(1, state.graphTarget + 0.02);
    }
  } else {
    state.usingHand = false;
    state.gesture = 'NONE';
  }
}

function drawHandViz(results) {
  const ctx = handX;
  const w = handC.width, h = handC.height;
  ctx.save();
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, w, h);
  ctx.translate(w, 0);
  ctx.scale(-1, 1);
  if (results.image) { try { ctx.drawImage(results.image, 0, 0, w, h); } catch(e){} }
  ctx.restore();
  if (results.multiHandLandmarks) {
    results.multiHandLandmarks.forEach(lm => {
      const conns = [[0,1],[1,2],[2,3],[3,4],[0,5],[5,6],[6,7],[7,8],[5,9],[9,10],[10,11],[11,12],[9,13],[13,14],[14,15],[15,16],[13,17],[17,18],[18,19],[19,20],[0,17]];
      ctx.strokeStyle = '#cc88ff';
      ctx.lineWidth = 1.5;
      conns.forEach(([a,b]) => {
        ctx.beginPath();
        ctx.moveTo((1-lm[a].x)*w, lm[a].y*h);
        ctx.lineTo((1-lm[b].x)*w, lm[b].y*h);
        ctx.stroke();
      });
      ctx.fillStyle = '#ffaaff';
      lm.forEach(p => {
        ctx.beginPath();
        ctx.arc((1-p.x)*w, p.y*h, 2.5, 0, Math.PI*2);
        ctx.fill();
      });
    });
  }
}

function loadScript(src) {
  return new Promise((resolve, reject) => {
    if (document.querySelector(`script[src="${src}"]`)) return resolve();
    const s = document.createElement('script');
    s.src = src; s.async = true; s.crossOrigin = 'anonymous';
    s.onload = resolve;
    s.onerror = () => reject(new Error('Failed to load ' + src));
    document.head.appendChild(s);
  });
}

camBtn.addEventListener('click', () => {
  if (handRunning) stopCamera();
  else startCamera();
});

// START IMMEDIATELY (no button needed)
requestAnimationFrame(loop);
})();
</script>
