<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    
    <!-- Mobile PWA Fullscreen Meta Tags -->
    <meta name="theme-color" content="#07080c" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Atulya" />
    
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <title>Atulya Tantra Drishti</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/frontend/main.jsx"></script>
    
    <!-- Register PWA Service Worker -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then((reg) => console.log('Atulya Service Worker registered:', reg.scope))
            .catch((err) => console.warn('Service Worker registration skipped:', err));
        });
      }
    </script>
  </body>
</html>
