# Atulya Tantra - Configuration File
# Version: 2.5.0

# Application Settings
app:
  name: "Atulya Tantra"
  version: "2.5.0"
  environment: "development"
  debug: true
  log_level: "INFO"

# Database Configuration
database:
  url: "postgresql://postgres:postgres@localhost:5432/atulya_tantra"
  pool_size: 10
  max_overflow: 20
  echo: false

# Redis Configuration
redis:
  url: "redis://localhost:6379"
  password: ""
  db: 0
  max_connections: 20

# Security Configuration
security:
  secret_key: "your-secret-key-here-change-in-production"
  jwt_secret: "your-jwt-secret-here-change-in-production"
  jwt_algorithm: "HS256"
  jwt_expiration_hours: 24
  encryption_key: "your-encryption-key-here-change-in-production"

# AI Service Configuration
ai_services:
  openai:
    api_key: "your-openai-api-key-here"
    api_base: "https://api.openai.com/v1"
    model: "gpt-4"
    max_tokens: 4000
    temperature: 0.7
  
  anthropic:
    api_key: "your-anthropic-api-key-here"
    api_base: "https://api.anthropic.com"
    model: "claude-3-sonnet-20240229"
    max_tokens: 4000
    temperature: 0.7
  
  ollama:
    base_url: "http://localhost:11434"
    model: "llama2"

# Feature Flags
features:
  # Core Features
  streaming: true
  markdown_rendering: true
  voice_interface: true
  vision: true
  file_attachments: true
  
  # JARVIS Features
  personality_engine: true
  proactive_assistance: true
  emotional_intelligence: true
  natural_language_understanding: true
  
  # Skynet Features
  autonomous_operations: false  # Requires explicit enable
  desktop_automation: false      # Requires explicit enable
  task_scheduling: true
  self_monitoring: true
  auto_healing: true
  
  # Specialized Agents
  code_agent: true
  research_agent: true
  creative_agent: true
  data_agent: true
  
  # Advanced
  external_integrations: false   # Requires API keys
  admin_dashboard: true

# External Integrations
integrations:
  calendar:
    enabled: false
    google_calendar:
      client_id: ""
      client_secret: ""
    outlook:
      client_id: ""
      client_secret: ""
  
  email:
    enabled: false
    smtp:
      host: "smtp.gmail.com"
      port: 587
      username: ""
      password: ""
    imap:
      host: "imap.gmail.com"
      port: 993
    use_tls: true
    use_ssl: true
  
  storage:
    enabled: false
    type: "local"  # local, google_drive, dropbox, onedrive
    google_drive:
      client_id: ""
      client_secret: ""
    dropbox:
      access_token: ""
    onedrive:
      client_id: ""
      client_secret: ""

# Monitoring Configuration
monitoring:
  prometheus:
    enabled: true
    port: 9090
  
  grafana:
    enabled: true
    port: 3000
  
  elk_stack:
    enabled: false

# Performance Configuration
performance:
  max_concurrent_tasks: 10
  max_retries: 3
  retry_delay: 60
  cache_ttl: 3600

# Rate Limiting
rate_limiting:
  requests_per_minute: 100
  burst_size: 20
  window_size: 60

# File Upload Configuration
file_upload:
  max_file_size: "50MB"
  allowed_types: ["pdf", "doc", "docx", "txt", "jpg", "jpeg", "png", "gif", "mp3", "wav", "mp4"]

# Voice Interface Configuration
voice:
  wake_word: "jarvis"
  timeout: 30
  language: "en-US"
  tts_voice: "default"

# System Configuration
system:
  monitoring_interval: 60
  health_check_interval: 30
  auto_backup_enabled: false
  backup_interval: 24