# Atulya Tantra - Logstash Configuration
# Version: 2.5.0

input {
  # File input for application logs
  file {
    path => "/app/logs/*.log"
    start_position => "beginning"
    codec => "json"
    tags => ["application"]
  }
  
  # Beats input for system logs
  beats {
    port => 5044
    tags => ["beats"]
  }
  
  # HTTP input for structured logs
  http {
    port => 8080
    codec => "json"
    tags => ["http"]
  }
}

filter {
  # Parse application logs
  if "application" in [tags] {
    # Parse timestamp
    date {
      match => [ "timestamp", "ISO8601" ]
    }
    
    # Parse log level
    if [level] {
      mutate {
        add_field => { "log_level" => "%{level}" }
      }
    }
    
    # Parse message
    if [message] {
      mutate {
        add_field => { "log_message" => "%{message}" }
      }
    }
    
    # Parse user context
    if [user_id] {
      mutate {
        add_field => { "user_context" => "%{user_id}" }
      }
    }
    
    # Parse request context
    if [request_id] {
      mutate {
        add_field => { "request_context" => "%{request_id}" }
      }
    }
  }
  
  # Parse HTTP logs
  if "http" in [tags] {
    # Parse request method and path
    if [method] and [path] {
      mutate {
        add_field => { "http_request" => "%{method} %{path}" }
      }
    }
    
    # Parse response status
    if [status] {
      mutate {
        add_field => { "http_status" => "%{status}" }
      }
    }
    
    # Parse response time
    if [response_time] {
      mutate {
        add_field => { "http_response_time" => "%{response_time}" }
      }
    }
  }
  
  # Parse system logs
  if "beats" in [tags] {
    # Parse system metrics
    if [system] {
      mutate {
        add_field => { "system_metrics" => "%{system}" }
      }
    }
    
    # Parse process information
    if [process] {
      mutate {
        add_field => { "process_info" => "%{process}" }
      }
    }
  }
  
  # Add common fields
  mutate {
    add_field => { "service" => "atulya-tantra" }
    add_field => { "environment" => "%{ENVIRONMENT}" }
  }
  
  # Remove sensitive data
  mutate {
    remove_field => [ "password", "token", "secret", "key" ]
  }
}

output {
  # Output to Elasticsearch
  elasticsearch {
    hosts => ["elasticsearch:9200"]
    index => "atulya-tantra-logs-%{+YYYY.MM.dd}"
    template_name => "atulya-tantra-logs"
    template => "/etc/logstash/templates/atulya-tantra-logs.json"
    template_overwrite => true
  }
  
  # Output to stdout for debugging
  stdout {
    codec => rubydebug
  }
}
