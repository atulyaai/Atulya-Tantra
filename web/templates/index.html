<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atulya Tantra - AI Assistant</title>
    <style>
        :root[data-theme="light"] {
            --bg-primary: #f8fafc;
            --bg-secondary: #ffffff;
            --bg-tertiary: #f1f5f9;
            --text-primary: #0f172a;
            --text-secondary: #475569;
            --accent: #6366f1;
            --accent-hover: #4f46e5;
            --user-msg: #6366f1;
            --ai-msg: #e2e8f0;
            --ai-msg-text: #1e293b;
            --border: #e2e8f0;
            --shadow: rgba(0, 0, 0, 0.1);
        }

        :root[data-theme="dark"] {
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --bg-tertiary: #334155;
            --text-primary: #f1f5f9;
            --text-secondary: #cbd5e1;
            --accent: #818cf8;
            --accent-hover: #6366f1;
            --user-msg: #6366f1;
            --ai-msg: #334155;
            --ai-msg-text: #f1f5f9;
            --border: #334155;
            --shadow: rgba(0, 0, 0, 0.3);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            flex-direction: column;
            transition: background 0.3s, color 0.3s;
        }

        .header {
            background: var(--bg-secondary);
            padding: 1rem 1.5rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 1px 3px var(--shadow);
        }

        .brand {
            font-size: 1.25rem;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header-controls {
            display: flex;
            gap: 0.75rem;
            align-items: center;
        }

        .theme-toggle {
            background: var(--bg-tertiary);
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.25rem;
            transition: all 0.2s;
        }

        .theme-toggle:hover {
            transform: scale(1.1);
        }

        .status-badge {
            background: #10b981;
            color: white;
            padding: 0.25rem 0.75rem;
            border-radius: 1rem;
            font-size: 0.75rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .status-dot {
            width: 6px;
            height: 6px;
            background: currentColor;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .message {
            max-width: 80%;
            padding: 0.875rem 1.125rem;
            border-radius: 1rem;
            line-height: 1.6;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.user {
            align-self: flex-end;
            background: var(--user-msg);
            color: white;
            border-bottom-right-radius: 0.25rem;
        }

        .message.assistant {
            align-self: flex-start;
            background: var(--ai-msg);
            color: var(--ai-msg-text);
            border-bottom-left-radius: 0.25rem;
        }

        .message.streaming {
            position: relative;
        }

        .message.streaming::after {
            content: '▊';
            animation: blink 1s infinite;
            margin-left: 2px;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        .input-area {
            background: var(--bg-secondary);
            padding: 1rem 1.5rem;
            border-top: 1px solid var(--border);
        }

        .input-wrapper {
            display: flex;
            gap: 0.75rem;
            margin-bottom: 0.75rem;
        }

        .text-input {
            flex: 1;
            background: var(--bg-tertiary);
            border: 2px solid transparent;
            padding: 0.875rem 1.125rem;
            border-radius: 1.5rem;
            color: var(--text-primary);
            font-size: 1rem;
            outline: none;
            transition: all 0.2s;
        }

        .text-input:focus {
            border-color: var(--accent);
            background: var(--bg-primary);
        }

        .send-btn {
            background: var(--accent);
            color: white;
            border: none;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            flex-shrink: 0;
        }

        .send-btn:hover {
            background: var(--accent-hover);
            transform: scale(1.05);
        }

        .send-btn:active {
            transform: scale(0.95);
        }

        .action-buttons {
            display: flex;
            gap: 0.5rem;
        }

        .action-btn {
            flex: 1;
            background: var(--bg-tertiary);
            border: none;
            padding: 0.75rem;
            border-radius: 0.75rem;
            color: var(--text-secondary);
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .action-btn:hover {
            background: var(--accent);
            color: white;
        }

        .action-btn.active {
            background: #ef4444;
            color: white;
        }

        .status-text {
            text-align: center;
            font-size: 0.875rem;
            color: var(--text-secondary);
            margin-top: 0.5rem;
            min-height: 1.25rem;
        }

        @media (max-width: 768px) {
            .message {
                max-width: 90%;
            }
            .header {
                padding: 0.75rem 1rem;
            }
            .brand {
                font-size: 1.125rem;
            }
        }

        /* Loading animation */
        .typing-indicator {
            display: inline-flex;
            gap: 4px;
        }

        .typing-indicator span {
            width: 8px;
            height: 8px;
            background: var(--text-secondary);
            border-radius: 50%;
            animation: typing 1.4s infinite;
        }

        .typing-indicator span:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing-indicator span:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes typing {
            0%, 60%, 100% {
                transform: translateY(0);
                opacity: 0.7;
            }
            30% {
                transform: translateY(-10px);
                opacity: 1;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="brand">⚡ Atulya Tantra</div>
        <div class="header-controls">
            <div class="status-badge">
                <span class="status-dot"></span>
                <span>Online</span>
            </div>
            <button class="theme-toggle" onclick="toggleTheme()" title="Toggle theme">
                <span id="theme-icon">🌙</span>
            </button>
        </div>
    </div>

    <div class="chat-container" id="chat-box">
        <div class="message assistant">
            👋 Hello! I'm Atulya Tantra, your AI assistant. How can I help you today?
        </div>
    </div>

    <div class="input-area">
        <div class="status-text" id="status"></div>
        <div class="input-wrapper">
            <input type="text" class="text-input" id="text-input" placeholder="Type your message..." autocomplete="off">
            <button class="send-btn" onclick="sendMessage()" title="Send">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="22" y1="2" x2="11" y2="13"></line>
                    <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                </svg>
            </button>
        </div>
        <div class="action-buttons">
            <button class="action-btn" onclick="clearChat()">
                🗑️ Clear
            </button>
            <button class="action-btn" id="voice-btn" onclick="toggleVoice()">
                🎤 Voice
            </button>
        </div>
    </div>

    <script>
        const chatBox = document.getElementById('chat-box');
        const textInput = document.getElementById('text-input');
        const statusEl = document.getElementById('status');
        let voiceMode = false;

        // Theme toggle
        function toggleTheme() {
            const html = document.documentElement;
            const currentTheme = html.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            html.setAttribute('data-theme', newTheme);
            document.getElementById('theme-icon').textContent = newTheme === 'dark' ? '🌙' : '☀️';
            localStorage.setItem('theme', newTheme);
        }

        // Load saved theme
        const savedTheme = localStorage.getItem('theme') || 'dark';
        document.documentElement.setAttribute('data-theme', savedTheme);
        document.getElementById('theme-icon').textContent = savedTheme === 'dark' ? '🌙' : '☀️';

        function setStatus(msg) {
            statusEl.textContent = msg;
        }

        function addMessage(text, type, isStreaming = false) {
            const div = document.createElement('div');
            div.className = `message ${type}${isStreaming ? ' streaming' : ''}`;
            div.textContent = text;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
            return div;
        }

        function addTypingIndicator() {
            const div = document.createElement('div');
            div.className = 'message assistant';
            div.id = 'typing-indicator';
            div.innerHTML = '<div class="typing-indicator"><span></span><span></span><span></span></div>';
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function removeTypingIndicator() {
            const indicator = document.getElementById('typing-indicator');
            if (indicator) indicator.remove();
        }

        async function sendMessage() {
            const text = textInput.value.trim();
            if (!text) return;

            textInput.value = '';
            addMessage(text, 'user');
            addTypingIndicator();
            setStatus('Thinking...');

            try {
                const response = await fetch('/api/chat/stream', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: text })
                });

                removeTypingIndicator();

                if (!response.ok) {
                    throw new Error('Request failed');
                }

                // Handle streaming response
                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let messageDiv = addMessage('', 'assistant', true);
                let fullText = '';

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    const chunk = decoder.decode(value);
                    const lines = chunk.split('\n');

                    for (const line of lines) {
                        if (line.startsWith('data: ')) {
                            const data = line.slice(6);
                            if (data === '[DONE]') {
                                messageDiv.classList.remove('streaming');
                                setStatus('');
                                continue;
                            }
                            try {
                                const json = JSON.parse(data);
                                if (json.token) {
                                    fullText += json.token;
                                    messageDiv.textContent = fullText;
                                    chatBox.scrollTop = chatBox.scrollHeight;
                                }
                            } catch (e) {
                                // Ignore parse errors
                            }
                        }
                    }
                }

                if (voiceMode && fullText) {
                    await speak(fullText);
                }

            } catch (error) {
                removeTypingIndicator();
                addMessage(`Error: ${error.message}`, 'assistant');
                setStatus('');
            }
        }

        textInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });

        function toggleVoice() {
            voiceMode = !voiceMode;
            const btn = document.getElementById('voice-btn');
            if (voiceMode) {
                btn.classList.add('active');
                btn.textContent = '🔴 Voice On';
            } else {
                btn.classList.remove('active');
                btn.textContent = '🎤 Voice';
            }
        }

        async function speak(text) {
            if (!('speechSynthesis' in window)) return;

            setStatus('Speaking...');
            speechSynthesis.cancel();

            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'en-US';
            utterance.rate = 0.95;

            await new Promise((resolve) => {
                utterance.onend = resolve;
                utterance.onerror = resolve;
                speechSynthesis.speak(utterance);
            });

            setStatus('');
        }

        function clearChat() {
            if (confirm('Clear chat history?')) {
                chatBox.innerHTML = '<div class="message assistant">👋 Hello! I\'m Atulya Tantra, your AI assistant. How can I help you today?</div>';
            }
        }
    </script>
</body>
</html>
