<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Atulya Tantra</title>
    <style>
        :root {
            --primary: #667eea;
            --bg: #f5f7fa;
            --chat-bg: #ffffff;
            --user-msg: #667eea;
            --ai-msg: #e2e8f0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg);
            height: 100dvh;
            width: 100%;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .header {
            background: #fff;
            padding: 15px 20px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
            flex-shrink: 0;
        }

        .brand {
            font-weight: 700;
            font-size: 1.2rem;
            color: #2d3748;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .status {
            font-size: 0.8rem;
            color: #48bb78;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .status::before {
            content: '';
            display: block;
            width: 8px;
            height: 8px;
            background: currentColor;
            border-radius: 50%;
        }

        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
        }

        .message {
            max-width: 85%;
            padding: 12px 16px;
            border-radius: 15px;
            font-size: 1rem;
            line-height: 1.5;
            position: relative;
            word-wrap: break-word;
        }

        .message.user {
            align-self: flex-end;
            background: var(--user-msg);
            color: white;
            border-bottom-right-radius: 5px;
        }

        .message.assistant {
            align-self: flex-start;
            background: var(--ai-msg);
            color: #2d3748;
            border-bottom-left-radius: 5px;
        }

        .controls-area {
            background: #fff;
            padding: 15px;
            border-top: 1px solid #e2e8f0;
            flex-shrink: 0;
            padding-bottom: env(safe-area-inset-bottom, 15px);
        }

        .input-row {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }

        input[type="text"] {
            flex: 1;
            padding: 12px;
            border: 1px solid #e2e8f0;
            border-radius: 25px;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }

        input[type="text"]:focus {
            border-color: var(--primary);
        }

        .send-btn {
            background: var(--primary);
            color: white;
            border: none;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .action-row {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        .action-btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 12px;
            background: #edf2f7;
            color: #4a5568;
            font-weight: 600;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .action-btn.active {
            background: #fc8181;
            color: white;
            animation: pulse 1.5s infinite;
        }

        .action-btn.voice-active {
            background: #48bb78;
            color: white;
        }

        @keyframes pulse {
            0% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.02);
            }

            100% {
                transform: scale(1);
            }
        }

        .preview-area {
            padding: 10px 20px 0;
            display: none;
        }

        .preview-img {
            max-height: 150px;
            border-radius: 10px;
            border: 2px solid #e2e8f0;
        }

        #status-bar {
            text-align: center;
            font-size: 0.8rem;
            color: #718096;
            margin-top: 8px;
            height: 1.2em;
        }

        @media (max-width: 600px) {
            .message {
                max-width: 90%;
            }

            .header {
                padding: 10px 15px;
            }

            .controls-area {
                padding: 10px;
            }
        }
    </style>
</head>

<body>
    <div class="header">
        <div class="brand">⚡ Atulya Tantra</div>
        <div class="status" id="connection-status">Online</div>
    </div>

    <div class="chat-container" id="chat-box">
        <div class="message assistant">
            Hello! I am Atulya Tantra. You can type or speak to me.
        </div>
    </div>

    <div class="preview-area" id="preview-area">
        <img id="preview-img" class="preview-img">
    </div>

    <div class="controls-area">
        <div id="status-bar"></div>

        <div class="input-row">
            <input type="text" id="text-input" placeholder="Type a message..." autocomplete="off">
            <button class="send-btn" onclick="sendText()">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <line x1="22" y1="2" x2="11" y2="13"></line>
                    <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                </svg>
            </button>
        </div>

        <div class="action-row">
            <button class="action-btn" id="voice-btn" onclick="toggleVoiceMode()">
                🎤 Voice Mode
            </button>
            <button class="action-btn" onclick="clearChat()" style="flex: 0.5; background: #e2e8f0;">
                🗑️
            </button>
        </div>
        <input type="file" id="image-input" accept="image/*" style="display:none" onchange="handleImage(event)">
    </div>

    <script>
        let voiceMode = false;
        let recognition = null;
        let currentImage = null;

        const statusEl = document.getElementById('status-bar');
        const chatBox = document.getElementById('chat-box');

        function setStatus(msg) {
            statusEl.textContent = msg;
        }

        function addMessage(text, type) {
            const div = document.createElement('div');
            div.className = `message ${type}`;
            div.textContent = text;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        // --- Text Handling ---
        async function sendText() {
            const input = document.getElementById('text-input');
            const text = input.value.trim();
            if (!text) return;

            input.value = '';
            addMessage(text, 'user');
            setStatus('Thinking...');

            try {
                const endpoint = currentImage ? '/api/vision' : '/api/chat';
                const body = currentImage ? { message: text, image: currentImage } : { message: text };

                const res = await fetch(endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body)
                });

                const data = await res.json();

                if (currentImage) {
                    currentImage = null;
                    document.getElementById('preview-area').style.display = 'none';
                }

                if (data.error) throw new Error(data.error);

                addMessage(data.response, 'assistant');
                setStatus('');

                if (voiceMode) {
                    await speak(data.response);
                }

            } catch (e) {
                addMessage(`Error: ${e.message}`, 'assistant');
                setStatus('');
            }
        }

        document.getElementById('text-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendText();
        });

        let isProcessing = false;

        // --- Voice Handling (Web Speech API) ---
        function toggleVoiceMode() {
            const btn = document.getElementById('voice-btn');

            if (!voiceMode) {
                // Check if Web Speech API is available
                if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
                    alert('Voice recognition not supported in this browser. Please use Chrome, Edge, or Safari.');
                    return;
                }

                // Initialize recognition
                const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
                recognition = new SpeechRecognition();
                recognition.continuous = false;
                recognition.interimResults = false;
                recognition.lang = 'en-US';

                recognition.onstart = () => {
                    if (!isProcessing) {
                        btn.classList.add('active');
                        btn.textContent = '🔴 Listening...';
                        setStatus('Listening...');
                    }
                };

                recognition.onresult = async (event) => {
                    isProcessing = true; // Flag that we are processing a result
                    const transcript = event.results[0][0].transcript;
                    addMessage(transcript, 'user');
                    setStatus('Thinking...');

                    try {
                        const endpoint = currentImage ? '/api/vision' : '/api/chat';
                        const body = currentImage ? { message: transcript, image: currentImage } : { message: transcript };

                        const res = await fetch(endpoint, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(body)
                        });

                        const data = await res.json();

                        if (currentImage) {
                            currentImage = null;
                            document.getElementById('preview-area').style.display = 'none';
                        }

                        addMessage(data.response, 'assistant');

                        // Wait for speech to complete
                        await speak(data.response);

                    } catch (e) {
                        addMessage(`Error: ${e.message}`, 'assistant');
                        setStatus('');
                    } finally {
                        isProcessing = false; // Done processing
                        if (voiceMode) {
                            setStatus('Listening...');
                            setTimeout(startListening, 500);
                        }
                    }
                };

                recognition.onerror = (event) => {
                    console.error('Speech recognition error:', event.error);
                    if (event.error === 'no-speech') {
                        // Silence detected, just restart if not processing
                        if (!isProcessing && voiceMode) {
                            startListening();
                        }
                    } else {
                        setStatus('Error: ' + event.error);
                        if (voiceMode && !isProcessing) setTimeout(startListening, 1000);
                    }
                };

                recognition.onend = () => {
                    btn.classList.remove('active');
                    // If we are NOT processing a result and voice mode is on, it means we timed out or stopped unexpectedly
                    // So we should restart.
                    if (voiceMode && !isProcessing) {
                        setTimeout(startListening, 500);
                    }
                };

                voiceMode = true;
                isProcessing = false;
                btn.classList.add('voice-active');
                btn.textContent = '🔴 Listening...';
                setStatus('Voice Mode Active');
                startListening();

            } else {
                // Disable Voice Mode
                voiceMode = false;
                isProcessing = false;
                if (recognition) {
                    recognition.stop();
                }
                btn.classList.remove('voice-active');
                btn.classList.remove('active');
                btn.textContent = '🎤 Voice Mode';
                setStatus('');
            }
        }

        function startListening() {
            if (!voiceMode || !recognition) return;
            try {
                recognition.start();
            } catch (e) {
                // Already started, ignore
            }
        }

        // --- Voice Handling ---

        function getBestVoice() {
            // Check for manually saved voice first (legacy support)
            const savedVoiceName = localStorage.getItem('selectedVoice');
            if (savedVoiceName) {
                const voicesList = speechSynthesis.getVoices();
                const saved = voicesList.find(v => v.name === savedVoiceName);
                if (saved) return saved;
            }

            const voicesList = speechSynthesis.getVoices();
            if (voicesList.length === 0) return null;

            // Priority list of known good voices (Human sounding)
            // Mobile devices often use different names
            const preferred = [
                'Google US English',
                'Google UK English Female',
                'Samantha', // iOS/Mac
                'Karen', // iOS
                'Daniel', // iOS
                'Moira', // iOS
                'Rishi', // iOS
                'Tessa', // iOS
                'Microsoft Zira', // Windows
                'Microsoft David', // Windows
                'Natural', // Edge/Chrome natural voices
                'English United States', // Android generic high quality
                'en-us-x-iol-local' // Android local high quality
            ];

            // 1. Try exact/partial name match from preferred list
            for (const name of preferred) {
                const found = voicesList.find(v => v.name.includes(name));
                if (found) return found;
            }

            // 2. Try to find any "Google" voice (usually good on Android)
            const googleVoice = voicesList.find(v => v.name.includes('Google') && v.lang.startsWith('en'));
            if (googleVoice) return googleVoice;

            // 3. Try to find any "English" voice that is local (often better quality/lower latency)
            const localEnglish = voicesList.find(v => v.lang.startsWith('en') && v.localService);
            if (localEnglish) return localEnglish;

            // 4. Fallback: Prefer FEMALE voices if possible (User preference)
            const femaleVoice = voicesList.find(v =>
                v.lang.startsWith('en') &&
                (v.name.toLowerCase().includes('female') || v.name.toLowerCase().includes('woman') || v.name.includes('Zira') || v.name.includes('Samantha'))
            );
            if (femaleVoice) return femaleVoice;

            // 5. Final Fallback to any English voice
            return voicesList.find(v => v.lang.startsWith('en')) || voicesList[0];
        }

        // Force load voices
        if ('speechSynthesis' in window) {
            speechSynthesis.onvoiceschanged = () => {
                voices = speechSynthesis.getVoices(); // Update global list
                const voice = getBestVoice();
                if (voice) console.log("Voice loaded:", voice.name);
            };
        }

        async function speak(text) {
            setStatus('Speaking...');

            // Try Browser TTS first
            try {
                if ('speechSynthesis' in window) {
                    speechSynthesis.cancel();

                    const utterance = new SpeechSynthesisUtterance(text);
                    utterance.lang = 'en-US';

                    // Aggressively find the best voice every time
                    let voice = getBestVoice();

                    // If voices aren't loaded yet, wait a bit and try again
                    if (!voice) {
                        await new Promise(r => setTimeout(r, 100));
                        voice = getBestVoice();
                    }

                    if (voice) {
                        utterance.voice = voice;
                        // Adjust pitch/rate for more natural sound
                        if (voice.name.includes('Google')) {
                            utterance.pitch = 1.0;
                            utterance.rate = 0.95; // Slightly slower is more natural
                        }
                    }

                    await new Promise((resolve, reject) => {
                        // Define handlers once
                        const onEnd = () => {
                            clearTimeout(timeout);
                            resolve();
                        };

                        utterance.onend = onEnd;
                        utterance.onerror = (e) => {
                            console.warn('Browser TTS error:', e);
                            // Don't reject, just resolve to allow loop to continue
                            onEnd();
                        };

                        // Safety timeout
                        const timeout = setTimeout(() => {
                            console.warn('TTS timed out, forcing continue');
                            onEnd();
                        }, (text.length * 100) + 5000);

                        speechSynthesis.speak(utterance);
                    });

                    // Small delay after speaking to let audio fully clear before mic starts
                    await new Promise(r => setTimeout(r, 500));

                    setStatus('');
                    return; // Success
                }
            } catch (e) {
                console.warn('Browser TTS failed, trying server TTS:', e);
            }

            // Fallback to Server TTS (only if browser fails)
            try {
                const res = await fetch('/api/voice/synthesize', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text })
                });

                if (!res.ok) throw new Error('TTS request failed');

                const data = await res.json();

                if (data.audio) {
                    const audio = new Audio(data.audio);

                    // Handle autoplay policy
                    try {
                        await audio.play();
                        await new Promise((resolve) => {
                            audio.onended = resolve;
                            // Safety timeout
                            setTimeout(resolve, (audio.duration * 1000) + 2000 || 10000);
                        });
                    } catch (playError) {
                        console.warn('Audio playback failed:', playError);
                    }
                }
            } catch (e) {
                console.error('All TTS methods failed:', e);
            }

            setStatus('');
        }

        // --- Image Handling ---
        function handleImage(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function (evt) {
                currentImage = evt.target.result;
                const img = document.getElementById('preview-img');
                img.src = currentImage;
                document.getElementById('preview-area').style.display = 'block';
                setStatus('Image attached');
            };
            reader.readAsDataURL(file);
        }

        function stopSpeaking() {
            if ('speechSynthesis' in window) {
                speechSynthesis.cancel();
            }
            setStatus('Stopped');
            // If in voice mode, restart listening after a short pause
            if (voiceMode) {
                setTimeout(startListening, 500);
            }
        }

        function clearChat() {
            if (confirm('Clear chat?')) {
                chatBox.innerHTML = '';
                fetch('/api/clear', { method: 'POST' });
            }
        }
    </script>
</body>

</html>
