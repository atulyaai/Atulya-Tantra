<svg width="1200" height="420" viewBox="0 0 1200 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Four building blocks of NP-DNA</title>
  <desc id="desc">Genome, neural mesh, memory cortex and plasticity are four implemented concepts in the NP-DNA runtime.</desc>
  <defs>
    <linearGradient id="bg"><stop stop-color="#081329"/><stop offset="1" stop-color="#111d39"/></linearGradient>
    <style>.t{font:700 30px system-ui,Segoe UI,sans-serif;fill:#f7fbff}.h{font:700 20px system-ui,Segoe UI,sans-serif;fill:#f3f8ff}.b{font:500 14px system-ui,Segoe UI,sans-serif;fill:#acbfd5}.card{fill:#10213d;stroke-width:2;rx:16}.line{stroke:#314d70;stroke-width:2}</style>
  </defs>
  <rect width="1200" height="420" rx="24" fill="url(#bg)"/>
  <text class="t" x="56" y="62">NP-DNA Building Blocks</text>
  <text class="b" x="56" y="88">Architecture concepts implemented in the experimental runtime</text>
  <path class="line" d="M168 226H1030"/>
  <rect class="card" x="55" y="145" width="252" height="190" stroke="#9679ff"/>
  <text class="h" x="83" y="190">Genome</text><text class="b" x="83" y="224">Compact latent representation</text><text class="b" x="83" y="250">generates strand weights</text><text class="b" x="83" y="292">Component: weight generator</text>
  <rect class="card" x="333" y="145" width="252" height="190" stroke="#26d0bd"/>
  <text class="h" x="361" y="190">Neural Mesh</text><text class="b" x="361" y="224">Scores specialist strands</text><text class="b" x="361" y="250">and selects top-k routes</text><text class="b" x="361" y="292">Component: router</text>
  <rect class="card" x="611" y="145" width="252" height="190" stroke="#38bdf8"/>
  <text class="h" x="639" y="190">Memory Cortex</text><text class="b" x="639" y="224">Stores and retrieves</text><text class="b" x="639" y="250">external memory entries</text><text class="b" x="639" y="292">Component: retrieval memory</text>
  <rect class="card" x="889" y="145" width="252" height="190" stroke="#f6b84e"/>
  <text class="h" x="917" y="190">Plasticity</text><text class="b" x="917" y="224">Monitors runtime signals</text><text class="b" x="917" y="250">for growth and rebalance</text><text class="b" x="917" y="292">Component: adaptation hooks</text>
</svg>
