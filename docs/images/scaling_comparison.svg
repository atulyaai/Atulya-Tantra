<svg width="1200" height="470" viewBox="0 0 1200 470" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">NP-DNA configuration presets</title>
  <desc id="desc">A visual comparison of configuration dimensions documented in Atulya Tantra, without model quality claims.</desc>
  <defs>
    <linearGradient id="bg"><stop stop-color="#081329"/><stop offset="1" stop-color="#14244a"/></linearGradient>
    <style>.t{font:700 31px system-ui,Segoe UI,sans-serif;fill:#f7fbff}.s{font:500 14px system-ui,Segoe UI,sans-serif;fill:#b3c7db}.h{font:700 17px system-ui,Segoe UI,sans-serif;fill:#eff7ff}.box{fill:#10213d;stroke:#2b4667;stroke-width:2;rx:14}.seed{stroke:#2dd4bf}.small{stroke:#38bdf8}.medium{stroke:#a78bfa}.large{stroke:#f5b84b}</style>
  </defs>
  <rect width="1200" height="470" rx="24" fill="url(#bg)"/>
  <text class="t" x="55" y="60">Configuration Presets</text>
  <text class="s" x="55" y="88">Documented shapes for experiments; benchmark results are reported separately.</text>
  <rect class="box seed" x="55" y="148" width="258" height="208"/>
  <text class="h" x="82" y="188">atulya_seed</text><text class="s" x="82" y="230">Vocab     4,096</text><text class="s" x="82" y="260">Hidden    64</text><text class="s" x="82" y="290">State     32</text><text class="s" x="82" y="320">Layers    2 mesh layers</text>
  <rect class="box small" x="334" y="148" width="258" height="208"/>
  <text class="h" x="361" y="188">atulya_small</text><text class="s" x="361" y="230">Vocab     4,096</text><text class="s" x="361" y="260">Hidden    64</text><text class="s" x="361" y="290">State     32</text><text class="s" x="361" y="320">Layers    5 named</text>
  <rect class="box medium" x="613" y="148" width="258" height="208"/>
  <text class="h" x="640" y="188">atulya_medium</text><text class="s" x="640" y="230">Vocab     50,000</text><text class="s" x="640" y="260">Hidden    512</text><text class="s" x="640" y="290">State     256</text><text class="s" x="640" y="320">Layers    6 mesh layers</text>
  <rect class="box large" x="892" y="148" width="258" height="208"/>
  <text class="h" x="919" y="188">atulya_large</text><text class="s" x="919" y="230">Vocab     50,000</text><text class="s" x="919" y="260">Hidden    768</text><text class="s" x="919" y="290">State     512</text><text class="s" x="919" y="320">Layers    5 named</text>
  <text class="s" x="55" y="412">Use the preset table below for mesh details and source configuration names.</text>
</svg>
