<svg width="1200" height="430" viewBox="0 0 1200 430" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Genome-generated weights concept</title>
  <desc id="desc">Instead of describing benchmark results, this diagram shows how a genome may generate weights for routed specialist strands.</desc>
  <defs>
    <linearGradient id="bg"><stop stop-color="#081329"/><stop offset="1" stop-color="#13233f"/></linearGradient>
    <style>.t{font:700 31px system-ui,Segoe UI,sans-serif;fill:#f7fbff}.s{font:500 15px system-ui,Segoe UI,sans-serif;fill:#b1c6db}.h{font:700 19px system-ui,Segoe UI,sans-serif;fill:#eff8ff}.box{fill:#10213d;stroke:#2e4d71;stroke-width:2;rx:16}.arrow{stroke:#23c9c6;stroke-width:3;fill:none}.note{fill:#182740;stroke:#f5b84b;stroke-width:1.6;rx:12}</style>
  </defs>
  <rect width="1200" height="430" rx="24" fill="url(#bg)"/>
  <text class="t" x="54" y="58">Genome-Generated Weights</text>
  <text class="s" x="54" y="86">Architecture concept: measure storage, quality and runtime tradeoffs through benchmarks</text>
  <rect class="box" x="64" y="150" width="260" height="148"/>
  <text class="h" x="94" y="192">Genome Latent</text><text class="s" x="94" y="225">compact learned state</text><text class="s" x="94" y="252">and generator input</text>
  <rect class="box" x="470" y="150" width="260" height="148"/>
  <text class="h" x="500" y="192">Weight Generator</text><text class="s" x="500" y="225">produces parameters</text><text class="s" x="500" y="252">for selected strands</text>
  <rect class="box" x="876" y="150" width="260" height="148"/>
  <text class="h" x="906" y="192">Active Strands</text><text class="s" x="906" y="225">mesh-routed execution</text><text class="s" x="906" y="252">for current tokens</text>
  <path class="arrow" d="M324 224H470"/><path class="arrow" d="M730 224H876"/>
  <text class="h" x="383" y="210">generate</text><text class="h" x="782" y="210">route</text>
  <rect class="note" x="305" y="344" width="590" height="48"/>
  <text class="s" x="337" y="375">No fixed reduction claim: report results only from reproducible experiments.</text>
</svg>
