<svg width="1200" height="650" viewBox="0 0 1200 650" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Atulya Tantra system architecture</title>
  <desc id="desc">A local-first AI workspace connecting the NP-DNA runtime, memory, dashboard, automation and training systems.</desc>
  <defs>
    <linearGradient id="bg" x2="1" y2="1"><stop stop-color="#081329"/><stop offset="1" stop-color="#14244a"/></linearGradient>
    <linearGradient id="panel" x2="1"><stop stop-color="#101e3d"/><stop offset="1" stop-color="#122b45"/></linearGradient>
    <linearGradient id="accent" x2="1"><stop stop-color="#23d5d1"/><stop offset=".55" stop-color="#8a72ff"/><stop offset="1" stop-color="#ffbc55"/></linearGradient>
    <style>
      .title{font:700 34px system-ui,Segoe UI,sans-serif;fill:#f6fbff}.sub{font:500 16px system-ui,Segoe UI,sans-serif;fill:#aac1d8}
      .box{fill:url(#panel);stroke:#27496e;stroke-width:2;rx:16}.core{stroke:#25caca;stroke-width:2.5}
      .head{font:700 19px system-ui,Segoe UI,sans-serif;fill:#f2f8ff}.body{font:500 14px system-ui,Segoe UI,sans-serif;fill:#a7bfd6}
      .line{stroke:#25caca;stroke-width:2;fill:none}.dash{stroke-dasharray:7 7}
    </style>
  </defs>
  <rect width="1200" height="650" rx="24" fill="url(#bg)"/>
  <rect x="48" y="42" width="8" height="48" rx="4" fill="url(#accent)"/>
  <text class="title" x="72" y="70">Atulya Tantra Architecture</text>
  <text class="sub" x="72" y="96">Local workspace for model experiments, memory, UI controls and automation</text>

  <rect class="box core" x="365" y="174" width="470" height="260"/>
  <text class="head" x="405" y="213">NP-DNA Runtime</text>
  <text class="body" x="405" y="242">tokenizer  |  genome weight generator  |  sparse mesh</text>
  <text class="body" x="405" y="267">cortex retrieval  |  plasticity checks  |  output head</text>
  <rect class="box" x="405" y="305" width="116" height="76"/><text class="head" x="426" y="338">Genome</text><text class="body" x="421" y="361">weights</text>
  <rect class="box" x="541" y="305" width="116" height="76"/><text class="head" x="574" y="338">Mesh</text><text class="body" x="563" y="361">routing</text>
  <rect class="box" x="677" y="305" width="116" height="76"/><text class="head" x="700" y="338">Cortex</text><text class="body" x="696" y="361">memory</text>

  <rect class="box" x="70" y="195" width="222" height="100"/><text class="head" x="98" y="233">Training</text><text class="body" x="98" y="260">datasets + checkpoints</text>
  <rect class="box" x="70" y="340" width="222" height="100"/><text class="head" x="98" y="378">Memory</text><text class="body" x="98" y="405">providers + summaries</text>
  <rect class="box" x="908" y="195" width="222" height="100"/><text class="head" x="936" y="233">WebUI</text><text class="body" x="936" y="260">dashboard + API</text>
  <rect class="box" x="908" y="340" width="222" height="100"/><text class="head" x="936" y="378">Yantra</text><text class="body" x="936" y="405">tools + automation</text>

  <path class="line" d="M292 245H365"/><path class="line" d="M292 390H365"/>
  <path class="line" d="M835 245H908"/><path class="line" d="M835 390H908"/>
  <rect class="box" x="150" y="508" width="900" height="78"/>
  <text class="head" x="189" y="542">Local-first workspace</text>
  <text class="body" x="189" y="565">Python package  |  CPU-capable training  |  dashboard controls  |  tests and documentation</text>
  <path class="line dash" d="M600 434V508"/>
</svg>
