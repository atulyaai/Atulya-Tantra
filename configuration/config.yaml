# Atulya Tantra - Unified Configuration System
# Version: 1.5.0
# This file contains all system configuration in a single, organized location

# =============================================================================
# SYSTEM CONFIGURATION
# =============================================================================
system:
  name: "Atulya Tantra"
  version: "1.5.0"
  codename: "Foundation"
  status: "beta"
  final_release: false
  debug: false
  log_level: "INFO"
  
# =============================================================================
# SERVER CONFIGURATION
# =============================================================================
server:
  host: "0.0.0.0"
  port: 8000
  workers: 1
  reload: false
  cors_origins:
    - "http://localhost:3000"
    - "http://localhost:8000"
    - "http://127.0.0.1:8000"
  
# =============================================================================
# AI MODELS CONFIGURATION
# =============================================================================
models:
  # Default model settings
  default:
    provider: "openai"
    model: "gpt-4"
    temperature: 0.7
    max_tokens: 4096
    timeout: 30
  
  # Provider configurations
  providers:
    openai:
      api_key: "${OPENAI_API_KEY}"
      models:
        - "gpt-4"
        - "gpt-4-turbo"
        - "gpt-3.5-turbo"
        - "gpt-3.5-turbo-16k"
      base_url: "https://api.openai.com/v1"
      
    anthropic:
      api_key: "${ANTHROPIC_API_KEY}"
      models:
        - "claude-3-opus-20240229"
        - "claude-3-sonnet-20240229"
        - "claude-3-haiku-20240307"
      base_url: "https://api.anthropic.com"
      
    google:
      api_key: "${GOOGLE_API_KEY}"
      models:
        - "gemini-pro"
        - "gemini-pro-vision"
      base_url: "https://generativelanguage.googleapis.com/v1beta"
      
    ollama:
      base_url: "http://localhost:11434"
      models:
        - "llama2"
        - "codellama"
        - "mistral"
        - "phi3"
  
  # Model routing rules
  routing:
    simple_questions:
      providers: ["openai", "anthropic"]
      model: "gpt-3.5-turbo"
      
    complex_reasoning:
      providers: ["openai", "anthropic"]
      model: "gpt-4"
      
    code_generation:
      providers: ["openai", "ollama"]
      model: "gpt-4"
      
    vision_tasks:
      providers: ["openai", "google"]
      model: "gpt-4-vision-preview"

# =============================================================================
# VOICE CONFIGURATION
# =============================================================================
voice:
  # Wake word detection
  wake_word:
    enabled: true
    phrase: "hey jarvis"
    sensitivity: 0.5
    timeout: 3.0
  
  # Speech-to-Text
  stt:
    provider: "openai"
    model: "whisper-1"
    language: "en-US"
    timeout: 30
    
  # Text-to-Speech
  tts:
    provider: "edge"
    voice: "en-US-AriaNeural"
    rate: 1.0
    volume: 1.0
    timeout: 30
  
  # Audio processing
  audio:
    sample_rate: 16000
    channels: 1
    chunk_size: 1024
    format: "int16"

# =============================================================================
# VISION CONFIGURATION
# =============================================================================
vision:
  # Image processing
  image:
    max_size: "10MB"
    allowed_formats: ["jpg", "jpeg", "png", "gif", "webp"]
    max_dimensions: [4096, 4096]
    
  # Video processing
  video:
    max_size: "100MB"
    allowed_formats: ["mp4", "avi", "mov", "mkv"]
    max_duration: 300  # seconds
    
  # OCR settings
  ocr:
    provider: "tesseract"
    language: "eng"
    confidence_threshold: 0.7

# =============================================================================
# DESKTOP AUTOMATION
# =============================================================================
automation:
  enabled: true
  safety_mode: true
  
  # Screen capture
  screenshot:
    quality: 85
    format: "png"
    max_size: [1920, 1080]
  
  # Window management
  windows:
    max_windows: 10
    timeout: 5.0
  
  # File operations
  files:
    max_file_size: "50MB"
    allowed_extensions: [".txt", ".py", ".js", ".html", ".css", ".json", ".yaml", ".md"]

# =============================================================================
# SECURITY CONFIGURATION
# =============================================================================
security:
  # Authentication
  auth:
    enabled: true
    jwt_secret: "${JWT_SECRET}"
    jwt_expiry: 86400  # 24 hours
    max_login_attempts: 5
    lockout_duration: 900  # 15 minutes
  
  # Two-Factor Authentication
  two_factor:
    enabled: true
    issuer: "Atulya Tantra"
    algorithm: "SHA1"
    digits: 6
    period: 30
  
  # Encryption
  encryption:
    algorithm: "Fernet"
    key: "${ENCRYPTION_KEY}"
  
  # Audit logging
  audit:
    enabled: true
    log_file: "data/logs/audit.log"
    max_size: "10MB"
    backup_count: 5

# =============================================================================
# DATABASE CONFIGURATION
# =============================================================================
database:
  # Primary database
  primary:
    url: "sqlite:///./data/database/atulya_tantra.db"
    echo: false
    pool_size: 10
    max_overflow: 20
    pool_timeout: 30
    pool_recycle: 3600
  
  # Test database
  test:
    url: "sqlite:///./data/database/test.db"
    echo: false

# =============================================================================
# CACHING CONFIGURATION
# =============================================================================
cache:
  # Redis configuration
  redis:
    url: "redis://localhost:6379/0"
    password: "${REDIS_PASSWORD}"
    timeout: 5
    max_connections: 10
  
  # Memory cache
  memory:
    max_size: 1000
    ttl: 3600  # seconds
  
  # File cache
  file:
    directory: "data/cache"
    max_size: "1GB"
    ttl: 86400  # 24 hours

# =============================================================================
# MONITORING CONFIGURATION
# =============================================================================
monitoring:
  enabled: true
  
  # Metrics
  metrics:
    port: 9090
    path: "/metrics"
    interval: 30  # seconds
  
  # Health checks
  health:
    interval: 30  # seconds
    timeout: 10  # seconds
  
  # Performance monitoring
  performance:
    enabled: true
    sample_rate: 0.1  # 10% of requests
    max_samples: 1000

# =============================================================================
# ANALYTICS CONFIGURATION
# =============================================================================
analytics:
  enabled: true
  
  # Data retention
  retention:
    days: 90
    max_records: 100000
  
  # Performance tracking
  performance:
    enabled: true
    metrics:
      - "response_time"
      - "token_usage"
      - "error_rate"
      - "throughput"
  
  # User analytics
  users:
    enabled: true
    anonymize: true
    track_sessions: true

# =============================================================================
# LOGGING CONFIGURATION
# =============================================================================
logging:
  level: "INFO"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  
  # File logging
  file:
    enabled: true
    path: "data/logs/atulya_tantra.log"
    max_size: "10MB"
    backup_count: 5
  
  # Console logging
  console:
    enabled: true
    colored: true
  
  # Structured logging
  structured:
    enabled: true
    format: "json"

# =============================================================================
# FEATURE FLAGS
# =============================================================================
features:
  voice_interface: true
  desktop_control: true
  vision_capabilities: true
  multi_agent_system: true
  real_time_analytics: true
  advanced_security: true
  caching: true
  monitoring: true
  testing: true

# =============================================================================
# PERFORMANCE CONFIGURATION
# =============================================================================
performance:
  # Request limits
  limits:
    max_concurrent_requests: 100
    request_timeout: 30  # seconds
    response_timeout: 60  # seconds
  
  # Memory management
  memory:
    max_usage_mb: 2048
    gc_interval: 300  # seconds
  
  # Optimization
  optimization:
    enable_compression: true
    enable_caching: true
    enable_pooling: true

# =============================================================================
# BACKUP CONFIGURATION
# =============================================================================
backup:
  enabled: true
  
  # Schedule
  schedule:
    interval: 24  # hours
    time: "02:00"  # 2 AM
  
  # Retention
  retention:
    days: 30
    max_backups: 10
  
  # Storage
  storage:
    directory: "data/backups"
    compression: true
    encryption: true

# =============================================================================
# INTEGRATION CONFIGURATION
# =============================================================================
integrations:
  # Slack
  slack:
    enabled: false
    webhook_url: "${SLACK_WEBHOOK_URL}"
    bot_token: "${SLACK_BOT_TOKEN}"
  
  # Discord
  discord:
    enabled: false
    bot_token: "${DISCORD_BOT_TOKEN}"
    channel_id: "${DISCORD_CHANNEL_ID}"
  
  # Email
  email:
    enabled: false
    smtp_host: "smtp.gmail.com"
    smtp_port: 587
    username: "${SMTP_USERNAME}"
    password: "${SMTP_PASSWORD}"

# =============================================================================
# DEVELOPMENT CONFIGURATION
# =============================================================================
development:
  enabled: false
  
  # Debug tools
  debug:
    toolbar: false
    profiling: false
    hot_reload: false
  
  # Testing
  testing:
    database_url: "sqlite:///./data/database/test.db"
    mock_external_apis: true
    test_mode: false
