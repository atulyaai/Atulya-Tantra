name: CI
on: [push, pull_request]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.11"}
      - run: pip install ruff
      - run: ruff check . --ignore=E501,F401,E402 --statistics

  test:
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "${{ matrix.python-version }}"}
      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y libsndfile1 ffmpeg
      - run: pip install -e ".[dev,serve]"
      - run: python -m pytest -x --tb=short -q --ignore=tests/test_business_automation.py
