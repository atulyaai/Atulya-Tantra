version: '3.8'

services:
  atulya-server:
    build: .
    container_name: atulya-tantra-server
    ports:
      - "8000:8000"
    volumes:
      - ./server:/app/server
      - ./data:/app/data
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - DEFAULT_MODEL=phi3:mini
    depends_on:
      - ollama
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    container_name: atulya-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    restart: unless-stopped

volumes:
  ollama-data:

