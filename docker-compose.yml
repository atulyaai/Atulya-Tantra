version: "3.9"

services:
  app:
    build: .
    ports: ["8000:8000"]
    volumes:
      - ./config:/app/config
      - ./assets:/app/assets
      - ./outputs:/app/outputs
      - atulya_data:/app/data
    environment:
      - ATULYA_ENCRYPTION_KEY=${ATULYA_ENCRYPTION_KEY:-}
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports: ["80:80", "443:443"]
    volumes:
      - ./nginx:/etc/nginx/conf.d:ro
      - ./drishti/dist:/usr/share/nginx/html:ro
    depends_on: [app]
    restart: unless-stopped

volumes:
  atulya_data:
