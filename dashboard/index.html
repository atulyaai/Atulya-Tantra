<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atulya Tantra - Mission Control</title>
    <style>
        :root {
            --bg-color: #010409;
            --panel-bg: rgba(22, 27, 34, 0.8);
            --border-color: #30363d;
            --text-color: #c9d1d9;
            --accent-green: #238636;
            --accent-red: #da3633;
            --accent-blue: #58a6ff;
            --accent-cyan: #00f2ff;
            --font-mono: 'Outfit', 'Inter', sans-serif;
        }
        body {
            background: radial-gradient(circle at center, #0d1117 0%, #010409 100%);
            color: var(--text-color);
            font-family: var(--font-mono);
            margin: 0;
            padding: 20px;
            display: grid;
            grid-template-columns: 350px 1fr;
            grid-template-rows: auto 1fr auto;
            gap: 20px;
            height: 95vh;
            overflow: hidden;
        }
        header {
            grid-column: 1 / -1;
            border-bottom: 2px solid var(--accent-blue);
            padding-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 15px rgba(88, 166, 255, 0.2);
        }
        h1 { margin: 0; font-size: 1.5rem; letter-spacing: 2px; color: var(--accent-cyan); text-shadow: 0 0 10px var(--accent-cyan); }
        .uptime { font-size: 0.9rem; color: #8b949e; font-family: 'Courier New', monospace; }
        
        .panel {
            background: var(--panel-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.8);
            display: flex;
            flex-direction: column;
            transition: all 0.3s ease;
        }
        .panel:hover { border-color: var(--accent-blue); box-shadow: 0 0 20px rgba(88, 166, 255, 0.1); }
        
        .panel-header {
            font-weight: bold;
            margin-bottom: 15px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 8px;
            color: #8b949e;
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 1.5px;
        }
        
        #status-indicator {
            font-size: 1.8rem;
            font-weight: 800;
            text-align: center;
            margin: 15px 0;
            letter-spacing: 4px;
            text-shadow: 0 0 15px currentColor;
        }
        
        #active-goal {
            font-size: 1rem;
            color: var(--text-color);
            background: rgba(48, 54, 61, 0.4);
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 15px;
            border-left: 4px solid var(--accent-blue);
        }
        
        .stat-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        .stat-box {
            background: rgba(13, 17, 23, 0.6);
            padding: 15px;
            text-align: center;
            border-radius: 8px;
            border: 1px solid #30363d;
        }
        .stat-val { font-size: 1.8rem; font-weight: bold; }
        .stat-label { font-size: 0.65rem; color: #8b949e; margin-top: 5px; }
        
        #event-feed {
            flex-grow: 1;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 0.8rem;
            padding-right: 5px;
        }
        #event-feed::-webkit-scrollbar { width: 4px; }
        #event-feed::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 10px; }
        
        .event-item {
            margin-bottom: 8px;
            padding: 8px;
            background: rgba(22, 27, 34, 0.4);
            border-radius: 4px;
            display: flex;
            gap: 10px;
            border-left: 2px solid transparent;
        }
        .event-item:nth-child(even) { background: transparent; }
        .timestamp { color: #58a6ff; width: 65px; flex-shrink: 0; }
        .type { color: var(--accent-cyan); width: 80px; flex-shrink: 0; font-weight: bold; }
        
        footer {
            grid-column: 1 / -1;
            background: rgba(35, 41, 47, 0.4);
            border-radius: 12px;
            padding: 15px 25px;
            margin-top: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            border: 1px solid var(--border-color);
        }
        #last-speech {
            font-size: 1.1rem;
            color: var(--accent-cyan);
            font-style: italic;
            text-shadow: 0 0 8px rgba(0, 242, 255, 0.3);
        }
    </style>
</head>
<body>
    <header>
        <h1>ATULYA TANTRA // OBSERVABILITY</h1>
        <div class="uptime" id="clock">00:00:00</div>
    </header>

    <div class="panel">
        <div class="panel-header">System Status</div>
        <div id="status-indicator">OFFLINE</div>
        <div class="panel-header">Active Goal</div>
        <div id="active-goal">--</div>
        
        <div class="panel-header">Action Ledger</div>
        <div class="stat-grid">
            <div class="stat-box">
                <div class="stat-val success" id="ledger-success">0</div>
                <div class="stat-label">SUCCESS</div>
            </div>
            <div class="stat-box">
                <div class="stat-val fail" id="ledger-fail">0</div>
                <div class="stat-label">FAILURE</div>
            </div>
        </div>
        
        <div class="panel-header" style="margin-top: 10px;">Pulse / Idle</div>
        <div id="pulse-msg" style="color: #8b949e; text-align: center;">Waiting...</div>
    </div>

    <div class="panel">
        <div class="panel-header">Live Event Feed</div>
        <div id="event-feed">
            <!-- Events populated via JS -->
        </div>
    </div>

    <footer>
        <div class="panel-header">Last Speech</div>
        <div id="last-speech">...</div>
    </footer>

    <script>
        const API_BASE = '/api';
        
        function updateClock() {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString();
        }
        setInterval(updateClock, 1000);

        async function fetchStatus() {
            try {
                const res = await fetch(`${API_BASE}/status`);
                const data = await res.json();
                
                const ind = document.getElementById('status-indicator');
                ind.innerText = data.state;
                ind.style.color = data.state === 'IDLE' ? '#58a6ff' : (data.state === 'THINKING' ? '#e3b341' : '#238636');
                
                document.getElementById('active-goal').innerText = data.active_goal || "No Active Goal";
                document.getElementById('ledger-success').innerText = data.ledger.success;
                document.getElementById('ledger-fail').innerText = data.ledger.failure;
                document.getElementById('last-speech').innerText = data.last_speech || "...";
                document.getElementById('pulse-msg').innerText = data.pulse || "Waiting...";
                
            } catch (e) {
                document.getElementById('status-indicator').innerText = "DISCONNECTED";
                document.getElementById('status-indicator').style.color = '#da3633';
            }
        }

        let lastEventTime = 0;
        async function fetchEvents() {
            try {
                const res = await fetch(`${API_BASE}/events`);
                const events = await res.json();
                
                const container = document.getElementById('event-feed');
                // Only prepend new events
                // Simple version: clear and redraw top 20? 
                // Better: check redundancy. For now, simple render.
                
                const html = events.map(e => `
                    <div class="event-item">
                        <span class="timestamp">${new Date(e.timestamp * 1000).toLocaleTimeString().split(' ')[0]}</span>
                        <span class="type">[${e.type.toUpperCase()}]</span>
                        <span class="payload">${JSON.stringify(e.payload)}</span>
                    </div>
                `).join('');
                
                if (container.innerHTML !== html) {
                     container.innerHTML = html;
                }
            } catch (e) {}
        }

        setInterval(fetchStatus, 500);
        setInterval(fetchEvents, 1000);
        
        fetchStatus();
        fetchEvents();
    </script>
</body>
</html>
