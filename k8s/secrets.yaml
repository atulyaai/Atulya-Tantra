apiVersion: v1
kind: Secret
metadata:
  name: atulya-tantra-secrets
  namespace: atulya-tantra
type: Opaque
data:
  # Base64 encoded secrets
  # Note: In production, use proper secret management (e.g., HashiCorp Vault, AWS Secrets Manager)
  SECRET_KEY: <base64-encoded-secret-key>
  DATABASE_PASSWORD: <base64-encoded-db-password>
  REDIS_PASSWORD: <base64-encoded-redis-password>
  OPENAI_API_KEY: <base64-encoded-openai-key>
  ANTHROPIC_API_KEY: <base64-encoded-anthropic-key>
  JWT_SECRET: <base64-encoded-jwt-secret>
  ENCRYPTION_KEY: <base64-encoded-encryption-key>
