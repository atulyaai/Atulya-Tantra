apiVersion: apps/v1
kind: Deployment
metadata:
  name: atulya-tantra-app
  namespace: atulya-tantra
  labels:
    app: atulya-tantra
    component: app
spec:
  replicas: 3
  selector:
    matchLabels:
      app: atulya-tantra
      component: app
  template:
    metadata:
      labels:
        app: atulya-tantra
        component: app
    spec:
      containers:
      - name: atulya-tantra
        image: atulya-tantra:latest
        ports:
        - containerPort: 8000
          name: http
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: atulya-tantra-secrets
              key: DATABASE_PASSWORD
        - name: REDIS_URL
          valueFrom:
            secretKeyRef:
              name: atulya-tantra-secrets
              key: REDIS_PASSWORD
        - name: SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: atulya-tantra-secrets
              key: SECRET_KEY
        - name: OPENAI_API_KEY
          valueFrom:
            secretKeyRef:
              name: atulya-tantra-secrets
              key: OPENAI_API_KEY
        - name: ANTHROPIC_API_KEY
          valueFrom:
            secretKeyRef:
              name: atulya-tantra-secrets
              key: ANTHROPIC_API_KEY
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: atulya-tantra-secrets
              key: JWT_SECRET
        - name: ENCRYPTION_KEY
          valueFrom:
            secretKeyRef:
              name: atulya-tantra-secrets
              key: ENCRYPTION_KEY
        envFrom:
        - configMapRef:
            name: atulya-tantra-config
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "2Gi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /api/health/live
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /api/health/ready
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        volumeMounts:
        - name: logs
          mountPath: /app/logs
        - name: data
          mountPath: /app/data
      volumes:
      - name: logs
        emptyDir: {}
      - name: data
        persistentVolumeClaim:
          claimName: atulya-tantra-data-pvc
      restartPolicy: Always
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
