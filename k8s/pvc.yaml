kind: PersistentVolumeClaim
metadata:
  name: postgres-data-pvc
  namespace: atulya-tantra
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi
  storageClassName: fast-ssd
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
