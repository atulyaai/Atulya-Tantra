apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: atulya-tantra-data-pvc
  namespace: atulya-tantra
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  storageClassName: fast-ssd
---
